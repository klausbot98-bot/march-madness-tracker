<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Bet Tracker</title>
  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    button, input, select { font: inherit; border: none; outline: none; cursor: pointer; }
    img { display: block; max-width: 100%; }

    /* === DESIGN TOKENS === */
    :root {
      --bg:          #0a0e17;
      --bg2:         #0f1520;
      --card:        rgba(20, 26, 38, 0.82);
      --card-border: rgba(255, 255, 255, 0.06);
      --card-radius: 16px;
      --btn-radius:  12px;
      --green:       #30d158;
      --green-dim:   rgba(48, 209, 88, 0.14);
      --green-ring:  rgba(48, 209, 88, 0.35);
      --red:         #ff453a;
      --red-dim:     rgba(255, 69, 58, 0.14);
      --red-ring:    rgba(255, 69, 58, 0.35);
      --amber:       #ff9f0a;
      --amber-dim:   rgba(255, 159, 10, 0.14);
      --amber-ring:  rgba(255, 159, 10, 0.35);
      --blue:        #0a84ff;
      --blue-dim:    rgba(10, 132, 255, 0.14);
      --purple:      #bf5af2;
      --purple-dim:  rgba(191, 90, 242, 0.14);
      --text:        #ffffff;
      --text2:       #8e8e93;
      --text3:       #636366;
      --shadow:      0 4px 24px rgba(0, 0, 0, 0.35);
      --shadow-lg:   0 12px 40px rgba(0, 0, 0, 0.5);
      --font:        -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      --transition:  0.25s ease;
      --tab-h:       56px;
      --header-h:    110px;
    }

    /* === LAYOUT === */
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* === APP HEADER === */
    .app-header {
      background: rgba(10, 14, 23, 0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text2);
    }

    .header-date-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--card-border);
      color: var(--text2);
    }

    .header-bankroll {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .header-bankroll.positive { color: var(--green); }
    .header-bankroll.negative { color: var(--red); }

    .header-meta {
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* === TAB BARS === */
    .tab-bar-top {
      display: none; /* shown on desktop only */
      background: rgba(15, 21, 32, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--card-border);
      padding: 0 20px;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 99;
    }

    .tab-btn-top {
      background: transparent;
      color: var(--text2);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 16px 18px;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }

    .tab-btn-top:hover { color: var(--text); }
    .tab-btn-top.active { color: var(--text); border-bottom-color: var(--blue); }

    .tab-bar-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: rgba(10, 14, 23, 0.96);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--card-border);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .bottom-tab {
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      padding: 10px 4px;
      color: var(--text3);
      transition: color var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .bottom-tab.active { color: var(--text); }

    .bottom-tab-icon {
      font-size: 1.3rem;
      line-height: 1;
      transition: transform var(--transition);
    }

    .bottom-tab.active .bottom-tab-icon {
      filter: drop-shadow(0 0 6px rgba(255,255,255,0.3));
    }

    .bottom-tab-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .bottom-tab-badge {
      position: absolute;
      top: 6px;
      right: calc(50% - 20px);
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--red);
      color: #fff;
      font-size: 0.62rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* === MAIN CONTENT === */
    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .panel-content {
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    /* === GLASS CARD === */
    .glass-card {
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      box-shadow: var(--shadow);
    }

    .card-pad { padding: 16px; }

    /* === EMPTY STATES === */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text2);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-title { font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-meta { font-size: 0.85rem; color: var(--text2); }

    /* === LIVE TAB === */
    .live-card {
      border-radius: var(--card-radius);
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: fadeIn 0.25s ease;
    }

    .live-card.covering { border-left: 3px solid var(--green); }
    .live-card.not-covering { border-left: 3px solid var(--red); }
    .live-card.win { border-left: 3px solid var(--green); }
    .live-card.loss { border-left: 3px solid var(--red); }
    .live-card.upcoming { border-left: 3px solid var(--amber); }
    .live-card.push { border-left: 3px solid var(--amber); }

    /* Mobile live bet markup (shared) */
    .live-bet-mobile { padding: 14px; }

    .live-bet-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .live-bet-row-pick {
      font-size: 0.95rem;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .live-bet-row-meta {
      font-size: 0.78rem;
      color: var(--text2);
      white-space: nowrap;
    }

    .live-bet-row-units {
      font-size: 0.78rem;
      color: var(--text2);
    }

    .live-bet-row-status {
      font-size: 0.78rem;
      font-weight: 700;
    }

    .live-bet-row-status.covering, .live-bet-row-status.win { color: var(--green); }
    .live-bet-row-status.not-covering, .live-bet-row-status.loss { color: var(--red); }
    .live-bet-row-status.upcoming, .live-bet-row-status.push { color: var(--amber); }

    .mobile-live-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .mobile-live-meta {
      font-size: 0.72rem;
      color: var(--text2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .mobile-live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: livePulse 1.4s ease infinite;
      margin-left: 2px;
    }

    .mobile-live-scoreblock {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
    }

    .mobile-live-scoreline {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .mobile-live-clock {
      font-size: 0.72rem;
      color: var(--amber);
      font-weight: 700;
      margin-top: 3px;
    }

    /* Spread visualization */
    .mobile-spread-viz { padding: 4px 0; }

    .spread-track {
      position: relative;
      height: 6px;
      border-radius: 999px;
      background: var(--red-dim);
      margin-bottom: 6px;
    }

    .spread-track::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 50%;
      border-radius: 0 999px 999px 0;
      background: var(--green-dim);
    }

    .spread-threshold {
      position: absolute;
      top: -3px;
      width: 2px;
      height: 12px;
      background: rgba(255,255,255,0.5);
      border-radius: 1px;
      transform: translateX(-50%);
      z-index: 2;
    }

    .spread-marker {
      position: absolute;
      top: -5px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      transform: translateX(-50%);
      z-index: 3;
      transition: left 0.4s ease;
    }

    .spread-marker.covering { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .spread-marker.not-covering { background: var(--red); box-shadow: 0 0 8px var(--red); }

    .spread-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .spread-status {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
    }

    .spread-status.covering { color: var(--green); }
    .spread-status.not-covering { color: var(--red); }

    /* Total / Over visualization */
    .mobile-over-viz { padding: 4px 0; }

    .over-track {
      position: relative;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 6px;
      overflow: hidden;
    }

    .over-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .over-fill.on-pace { background: linear-gradient(90deg, var(--green), #00ff6a); }
    .over-fill.behind-pace { background: linear-gradient(90deg, var(--amber), #ff6b00); }

    .over-target-line {
      position: absolute;
      right: 0;
      top: 0;
      width: 2px;
      height: 100%;
      background: rgba(255,255,255,0.4);
    }

    .over-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .over-status {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
    }

    .over-status.on-pace { color: var(--green); }
    .over-status.behind-pace { color: var(--amber); }

    /* Under visualization */
    .mobile-under-viz { padding: 4px 0; }

    .under-track {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      margin-bottom: 6px;
      overflow: hidden;
    }

    .under-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .under-fill.safe { background: linear-gradient(90deg, var(--green), #00ff6a); }
    .under-fill.warning { background: linear-gradient(90deg, var(--amber), #ffcc00); }
    .under-fill.danger { background: linear-gradient(90deg, var(--red), #ff6b6b); }

    .under-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .under-status {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
    }

    .under-status.safe { color: var(--green); }
    .under-status.warning { color: var(--amber); }
    .under-status.danger { color: var(--red); }

    /* Margin bar (generic) */
    .mobile-live-barline { margin-bottom: 6px; }
    .mobile-margin-bar {
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .mobile-margin-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }
    .mobile-margin-fill.covering { background: var(--green); }
    .mobile-margin-fill.not-covering { background: var(--red); }
    .mobile-margin-fill.win { background: var(--green); }
    .mobile-margin-fill.loss { background: var(--red); }
    .mobile-margin-fill.upcoming { background: var(--amber); }

    .mobile-live-bottomline {
      font-size: 0.82rem;
      font-weight: 700;
      text-align: center;
    }
    .mobile-live-bottomline.covering { color: var(--green); }
    .mobile-live-bottomline.not-covering { color: var(--red); }
    .mobile-live-bottomline.upcoming { color: var(--amber); }

    /* Prop bars */
    .prop-leg { padding: 6px 0; border-top: 1px solid var(--card-border); }
    .prop-leg:first-child { border-top: none; }

    .prop-leg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .prop-leg-player {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .prop-leg-count {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .prop-leg-count.hit { background: var(--green-dim); color: var(--green); }
    .prop-leg-count.not-covering { background: var(--red-dim); color: var(--red); }
    .prop-leg-count.covering { background: var(--amber-dim); color: var(--amber); }

    .prop-bar-track {
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .prop-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .prop-bar-fill.hit { background: var(--green); }
    .prop-bar-fill.not-covering { background: var(--amber); }

    /* Parlay legs (in live tab) */
    .live-bet-parlay-legs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .live-bet-parlay-leg {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }

    .live-bet-parlay-leg.covering { border-color: var(--green-ring); color: var(--green); background: var(--green-dim); }
    .live-bet-parlay-leg.win { border-color: var(--green-ring); color: var(--green); background: var(--green-dim); }
    .live-bet-parlay-leg.not-covering { border-color: var(--red-ring); color: var(--red); background: var(--red-dim); }
    .live-bet-parlay-leg.loss { border-color: var(--red-ring); color: var(--red); background: var(--red-dim); }
    .live-bet-parlay-leg.upcoming { border-color: var(--amber-ring); color: var(--amber); background: var(--amber-dim); }

    .mobile-live-upcoming-count {
      text-align: center;
      padding: 10px;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .mobile-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* === PICKS TAB === */
    .picks-summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--card-border);
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-bottom: 4px;
    }

    .picks-summary-stat {
      background: var(--card);
      padding: 12px 14px;
      text-align: center;
    }

    .picks-summary-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .picks-summary-value {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .picks-summary-value.green { color: var(--green); }
    .picks-summary-value.amber { color: var(--amber); }

    .picks-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 2px 6px;
    }

    .picks-counter {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .picks-show-all {
      font-size: 0.8rem;
      color: var(--blue);
      font-weight: 600;
      background: transparent;
    }

    .picks-section-header {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text2);
      padding: 8px 2px 6px;
    }

    /* Pick card */
    .pick-card {
      position: relative;
      border-radius: var(--card-radius);
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: var(--card);
      box-shadow: var(--shadow);
      transition: opacity var(--transition), transform var(--transition);
      animation: fadeIn 0.25s ease;
    }

    .pick-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }

    .pick-card.core::before { background: var(--green); }
    .pick-card.value::before { background: var(--amber); }
    .pick-card.moonshot::before { background: var(--purple); }
    .pick-card.lean::before { background: var(--text2); }

    .pick-card.is-passed { opacity: 0.4; }
    .pick-card.is-fading-out { opacity: 0; transform: scale(0.97); }

    .pick-card-inner { padding: 14px 14px 14px 17px; }

    .pick-header {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .pick-badge {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .pick-badge.core { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-ring); }
    .pick-badge.value { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber-ring); }
    .pick-badge.moonshot { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(191,90,242,0.35); }
    .pick-badge.lean { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--card-border); }

    .pick-sport-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--card-border);
      color: var(--text2);
    }

    .pick-time {
      font-size: 0.65rem;
      color: var(--text3);
      margin-left: auto;
    }

    .pick-game {
      font-size: 0.82rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .pick-selection {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .pick-selection .pick-odds-inline {
      color: var(--amber);
      font-weight: 700;
      font-size: 0.9rem;
      margin-left: 5px;
    }

    .pick-sizing {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .pick-edge {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 10px;
    }

    /* Pick analysis expand */
    .pick-analysis {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 10px 12px;
      width: 100%;
      text-align: left;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .pick-analysis-preview {
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.5;
    }

    .pick-analysis-full {
      display: none;
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.6;
      margin-top: 6px;
    }

    .pick-analysis.expanded .pick-analysis-preview { display: none; }
    .pick-analysis.expanded .pick-analysis-full { display: block; }

    /* Pick actions */
    .pick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .pick-btn {
      border-radius: var(--btn-radius);
      font-size: 0.85rem;
      font-weight: 700;

      if (!cleaned.includes(":")) return Number.MAX_SAFE_INTEGER;

      const [rawHour, rawMinute] = time.split(":").map(Number);
      let hour = rawHour % 12;
      if (meridiem === "PM") hour += 12;
      return hour * 60 + rawMinute;
    }

    function parseGameStartDate(game) {
      if (game.eventDate) { const d = new Date(game.eventDate); if (!Number.isNaN(d.getTime())) return d; }
      if (!game.date || !game.displayTime || game.displayTime === "TBD" || game.displayTime === "Final") return null;
      const cleaned = String(game.displayTime).replace(" ET", "").trim();
      const match = cleaned.match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return null;
      let hour = Number(match[1]) % 12;
      if (match[3].toUpperCase() === "PM") hour += 12;
      return new Date(`${game.date}T${String(hour).padStart(2,"0")}:${String(Number(match[2])).padStart(2,"0")}:00`);
    }

    function isGameCompleted(game) {
      if (!game) return false;
      if (game.completed === true) return true;
      if (String(game.status || "").toLowerCase() === "post") return true;
      if (String(game.displayTime || "").toLowerCase() === "final") return true;
      const start = parseGameStartDate(game);
      if (!start) return false;
      return currentEtNow().getTime() >= start.getTime() + (3 * 60 * 60 * 1000);
    }

    function formatGameTime(dateValue) {
      if (!dateValue) return "TBD";
      const date = new Date(dateValue);
      if (Number.isNaN(date.getTime())) return "TBD";
      return `${date.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit", hour12: true, timeZone: "America/Toronto" })} ET`;
    }

    function isoDateInEt(dateValue) {
      if (!dateValue) return "";
      const date = new Date(dateValue);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleDateString("en-CA", { timeZone: "America/Toronto" });
    }

    function normalizeResult(result) {
      if (result === "won") return "win";
      if (result === "lost") return "loss";
      return result || null;
    }

    function isWin(result) { return normalizeResult(result) === "win"; }
    function isLoss(result) { return normalizeResult(result) === "loss"; }
    function isSettled(result) { return ["win","won","loss","lost","push"].includes(result); }
    function isPlaced(result) { return result === "placed" || isSettled(result); }
    function isLiveTabEligibleResult(result) { const n = normalizeResult(result); return n == null || n === "placed"; }

    function ticketProfit(item) {
      if (item.result === "placed") return -unitToDollars(item.units);
      if (isWin(item.result)) {
        if (item.payout) return item.payout - unitToDollars(item.units);
        return americanProfit(item.units, item.line);
      }
      if (isLoss(item.result)) return -unitToDollars(item.units);
      return 0;
    }

    function ticketReturn(item) {
      if (!item.result || item.result === "placed") return 0;
      if (isWin(item.result)) {
        if (item.payout != null) return item.payout;
        return unitToDollars(item.units) + americanProfit(item.units, item.line);
      }
      if (normalizeResult(item.result) === "push") return unitToDollars(item.units);
      return 0;
    }

    function inferBetTypeFromPick(pick) {
      const label = String(pick || "").toLowerCase();
      if (/over|under/.test(label)) return "total";
      if (/[+-]\d+(\.\d+)?/.test(label)) return "spread";
      return "ml";
    }

    function nextBetId() {
      return bets.reduce((max, b) => { const n = Number(b.id); return Number.isFinite(n) ? Math.max(max, n) : max; }, 0) + 1;
    }

    function sanitizeResult(result) {
      const normalized = normalizeResult(result);
      if (result === "declined") return "declined";
      return ["placed","win","loss","push"].includes(normalized) ? normalized : null;
    }

    function statusClass(result) {
      if (result === "declined") return "status-not-placed";
      const key = normalizeResult(result) || "not-placed";
      return `status-${key}`;
    }

    function statusLabel(result) {
      if (result === "declined") return "Declined";
      if (!result) return "Not Placed";
      if (result === "placed") return "Placed";
      if (isWin(result)) return "Won";
      if (isLoss(result)) return "Lost";
      const key = normalizeResult(result);
      return key ? key.charAt(0).toUpperCase() + key.slice(1) : "Not Placed";
    }

    function mobileResultEmoji(result) {
      if (isWin(result)) return "✅";
      if (isLoss(result)) return "❌";
      if (result === "declined") return "🚫";
      if (result === "push") return "➖";
      return "⏳";
    }

    function mobileStatusClassForResult(result) {
      if (isWin(result)) return "positive";
      if (isLoss(result)) return "negative";
      return "";
    }

    function mobileStatusEmoji(state) {
      if (state === "covering" || state === "win") return "✅";
      if (state === "not-covering" || state === "loss") return "❌";
      return "⏳";
    }

    function mobileStatusClass(state) {
      if (state === "win" || state === "loss" || state === "push") return state;
      return state === "covering" || state === "not-covering" ? state : "upcoming";
    }

    function allTickets() {
      return [
        ...bets.map(bet => ({ ...bet, ticketType: "bet", label: bet.pick })),
        ...parlays.map(parlay => ({ ...parlay, ticketType: "parlay", label: parlay.name }))
      ];
    }

    function tableTicket(item) {
      if (item.ticketType === "parlay") {
        const gameTime = item.gameTime || bets.find(b => item.legs.includes(b.pick))?.gameTime || "";
        return { ...item, id: String(item.id), gameTime, game: item.name, pick: item.legs.join(" / ") };
      }
      return { ...item, id: String(item.id) };
    }

    function summarize() {
      const tickets = allTickets();
      const settledTickets = tickets.filter(item => isSettled(item.result));
      const placedTickets = tickets.filter(item => item.result === "placed");
      const activeTickets = tickets.filter(item => isPlaced(item.result));
      const totalWagered = activeTickets.reduce((sum, item) => sum + unitToDollars(item.units), 0);
      const totalReturned = settledTickets.reduce((sum, item) => sum + ticketReturn(item), 0);
      const realized = tickets.reduce((sum, item) => sum + ticketProfit(item), 0);
      const settledRisked = settledTickets.reduce((sum, item) => sum + unitToDollars(item.units), 0);
      const wins = settledTickets.filter(item => isWin(item.result)).length;
      const losses = settledTickets.filter(item => isLoss(item.result)).length;
      const pushes = settledTickets.filter(item => item.result === "push").length;
      const placedCount = placedTickets.length;
      const notPlaced = tickets.filter(item => !item.result).length;
      const atRisk = placedTickets.reduce((sum, item) => sum + unitToDollars(item.units), 0);
      const roi = settledRisked ? (realized / settledRisked) * 100 : 0;
      const winRate = (wins + losses) ? (wins / (wins + losses)) * 100 : 0;
      const totalWon = settledTickets.filter(item => isWin(item.result)).reduce((sum, item) => sum + ticketProfit(item), 0);
      const totalLost = Math.abs(settledTickets.filter(item => isLoss(item.result)).reduce((sum, item) => sum + ticketProfit(item), 0));
      return { totalWagered, totalReturned, realized, roi, winRate, wins, losses, pushes, placedCount, atRisk, notPlaced, settledCount: settledTickets.length, totalWon, totalLost };
    }

    function overallRecord(items) {
      const settled = items.filter(item => isSettled(item.result));
      return {
        wins: settled.filter(item => isWin(item.result)).length,
        losses: settled.filter(item => isLoss(item.result)).length,
        pushes: settled.filter(item => item.result === "push").length
      };
    }

    function todayMetrics() {
      const today = currentEtDate();
      const items = allTickets().filter(item => item.date === today);
      const settled = items.filter(item => isSettled(item.result));
      const record = overallRecord(items);
      const pnl = items.reduce((sum, item) => sum + ticketProfit(item), 0);
      const risked = settled.reduce((sum, item) => sum + unitToDollars(item.units), 0);
      const roi = risked ? (settled.reduce((sum, item) => sum + ticketProfit(item), 0) / risked) * 100 : 0;
      return { pnl, record, roi };
    }

    function groupedStats(items, selector, values) {
      return values.map(value => {
        const filtered = items.filter(item => selector(item) === value);
        const settled = filtered.filter(item => isSettled(item.result));
        const wins = settled.filter(item => isWin(item.result)).length;
        const losses = settled.filter(item => isLoss(item.result)).length;
        const hitRate = wins + losses ? (wins / (wins + losses)) * 100 : 0;
        const profit = filtered.filter(item => item.result).reduce((sum, item) => sum + ticketProfit(item), 0);
        return { key: value, label: TYPE_LABELS[value] || CONFIDENCE_LABELS[value] || value, record: `${wins}-${losses}`, hitRate, count: filtered.length, profit };
      });
    }

    function recordString(items) {
      const wins = items.filter(i => isWin(i.result)).length;
      const losses = items.filter(i => isLoss(i.result)).length;
      const pushes = items.filter(i => i.result === "push").length;
      return `${wins}-${losses}-${pushes}`;
    }

    function parlayLegState(parlay, leg) {
      const customState = parlay.legStates?.[leg];
      const result = customState?.result ?? bets.find(bet => bet.pick === leg)?.result ?? null;
      if (!result || result === "placed" || result === "pending") return { icon: "⏳", label: "Pending" };
      if (isWin(result)) return { icon: "✅", label: "Won" };
      if (isLoss(result)) return { icon: "❌", label: "Lost" };
      return { icon: "⏳", label: "Push" };
    }

    function compactLegLabel(pick) {
      const teams = parsePickTeams(pick);
      const suffix = String(pick || "").replace(/^(.+?)\s+/, "").trim();
      const shortTeams = teams.length
        ? teams.map(team => {
            const aliases = Object.entries(TEAM_ALIASES).find(([, values]) => values.some(v => teamMatches(v, team)))?.[1] || [];
            const stateSchool = team.match(/^([A-Za-z]+)\s+(?:State|St)\b/i);
            const shortAlias = aliases.find(a => /^[A-Z]{2,4}$/.test(a))
              || (stateSchool ? `${stateSchool[1][0]}SU` : "")
              || aliases.find(a => a.length <= 4 && !a.includes(" "))
              || team.split(/\s+/).map(p => p[0]).join("").toUpperCase()
              || team.slice(0, 4).toUpperCase();
            return shortAlias.toUpperCase();
          }).join("/")
        : String(pick || "").split(/\s+/).slice(0, 2).join(" ");
      return suffix ? `${shortTeams} ${suffix}` : shortTeams;
    }

    // Pick actions helpers
    function pickActionFor(id) { return state.pickActions?.[String(id)] || null; }
    function pickStatusFor(id) { return pickActionFor(id)?.status || null; }
    function pickIsPassed(id) { return pickStatusFor(id) === "passed"; }
    function pickIsPlaced(id) { return pickStatusFor(id) === "placed"; }

    function visibleAiPicksForDate(date) {
      return aiPicks.filter(pick => {
        if (pick.date !== date) return false;
        const fading = state.fadingPickIds.has(String(pick.id));
        if (pickIsPlaced(pick.id) && !fading) return false;
        if (pickIsPassed(pick.id) && !state.showAllPassedPicks && !fading) return false;
        return true;
      });
    }

    function aiPickCounts(date) {
      const picks = aiPicks.filter(pick => pick.date === date);
      const remaining = picks.filter(pick => {
        const status = pickStatusFor(pick.id);
        return status !== "placed" && status !== "passed";
      }).length;
      return { picks, remaining, total: picks.length };
    }

    function aiPickDraftFor(pick) {
      return state.aiPickDrafts[String(pick.id)] || { odds: String(Number(pick.odds) || -110), units: String(Number(pick.units) || 0) };
    }

    function potentialPayoutForDraft(draft) {
      const odds = Number(draft?.odds);
      const units = Number(draft?.units);
      if (!Number.isFinite(odds) || !Number.isFinite(units) || units <= 0 || odds === 0) return "Enter odds + units";
      return `${formatCurrency(americanProfit(units, odds), { signed: false })} profit`;
    }

    function openAiPickEditor(id) {
      const pick = aiPicks.find(e => String(e.id) === String(id));
      if (!pick) return;
      state.editingAiPickId = String(id);
      state.aiPickDrafts[String(id)] = { odds: String(Number(pick.odds) || -110), units: String(Number(pick.units) || 0) };
      renderPicksTab();
      requestAnimationFrame(() => {
        const input = document.querySelector(`[data-ai-pick-input="${id}"][data-ai-pick-field="odds"]`);
        input?.focus(); input?.select();
      });
    }

    function cancelAiPickEditor(id) {
      if (String(state.editingAiPickId) !== String(id)) return;
      state.editingAiPickId = null;
      delete state.aiPickDrafts[String(id)];
      renderPicksTab();
    }

    function updateAiPickDraft(id, field, value) {
      const key = String(id);
      const draft = state.aiPickDrafts[key] || {};
      draft[field] = value;
      state.aiPickDrafts[key] = draft;
      document.querySelectorAll(`[data-ai-pick-payout="${key}"]`).forEach(node => {
        node.textContent = potentialPayoutForDraft(draft);
      });
    }

    function confirmAiPickPlacement(id) {
      const pick = aiPicks.find(e => String(e.id) === String(id));
      const draft = state.aiPickDrafts[String(id)];
      if (!pick || !draft) return;
      const odds = Number(draft.odds);
      const units = Number(draft.units);
      if (!Number.isFinite(odds) || odds === 0 || !Number.isFinite(units) || units <= 0) return;
      const newBet = { id: nextBetId(), date: pick.date, game: pick.game, pick: pick.pick, line: odds, originalLine: pick.odds, units, book: BET_BOOK, type: inferBetTypeFromPick(pick.pick), confidence: pick.confidence > 3 ? "high" : "medium", result: "placed", sport: pick.sport || "ncaab", notes: "AI pick placed via app" };
      bets.push(newBet);
      state.pickActions[String(id)] = { status: "placed", odds, units, placedAt: Date.now(), betId: newBet.id };
      state.editingAiPickId = null;
      delete state.aiPickDrafts[String(id)];
      renderPicksTab();
      window.setTimeout(() => {
        state.fadingPickIds.add(String(id));
        renderPicksTab();
        window.setTimeout(() => {
          state.fadingPickIds.delete(String(id));
          saveState();
          render();
        }, 600);
      }, 1500);
    }

    function passAiPick(id) {
      const key = String(id);
      state.fadingPickIds.add(key);
      renderPicksTab();
      window.setTimeout(() => {
        state.fadingPickIds.delete(key);
        state.pickActions[key] = { status: "passed", passedAt: Date.now() };
        if (state.editingAiPickId === key) { state.editingAiPickId = null; delete state.aiPickDrafts[key]; }
        saveState();
        renderPicksTab();
      }, 300);
    }

    function toggleShowAllPassedPicks() {
      state.showAllPassedPicks = !state.showAllPassedPicks;
      renderPicksTab();
    }

    function toggleAiPickExpanded(id) {
      const pick = aiPicks.find(e => String(e.id) === String(id));
      if (!pick) return;
      pick.expanded = !pick.expanded;
      saveState();
      renderPicksTab();
    }

    // === LIVE SCORE / ESPN INTEGRATION ===
    function getEspnClockForGame(game) {
      const searchNames = [];
      if (game?.teams?.length) { for (const t of game.teams) { if (t.name) searchNames.push(t.name); } }
      if (game?.home_team) searchNames.push(game.home_team);
      if (game?.away_team) searchNames.push(game.away_team);
      const uniqueSearchNames = [...new Set(searchNames.map(name => String(name || "").trim()).filter(Boolean))];
      if (!uniqueSearchNames.length) return null;
      const searchProfiles = uniqueSearchNames.map(name => buildTeamProfile(name));
      let bestEvent = null, bestScore = -1;
      const requiredMatches = Math.min(searchProfiles.length, 2);
      for (const event of espnClockEvents) {
        const matchedNames = new Set(), matchedTeams = new Set();
        searchProfiles.forEach((profile, profileIndex) => {
          event.teams.forEach((team, teamIndex) => {
            if (teamProfileMatchesEspnTeam(profile, team)) { matchedNames.add(profileIndex); matchedTeams.add(teamIndex); }
          });
        });
        if (matchedNames.size < requiredMatches) continue;
        const score = (matchedNames.size * 10) + matchedTeams.size;
        if (score > bestScore) { bestScore = score; bestEvent = event; }
      }
      if (bestEvent) return { period: bestEvent.period, clock: bestEvent.clock, statusDesc: bestEvent.statusDesc };
      for (const profile of searchProfiles) {
        for (const key of profile.keys) {
          const matches = espnClockData[key];
          if (matches?.length === 1) return matches[0];
        }
      }
      return null;
    }

    async function fetchEspnClock() {
      try {
        const today = currentEtDate().replace(/-/g, "");
        const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${today}`);
        if (!res.ok) return;
        const data = await res.json();
        const clockMap = {}, clockEvents = [];
        for (const event of data.events || []) {
          const comp = event.competitions?.[0];
          if (!comp) continue;
          const status = comp.status || {};
          const eventData = { eventId: event.id || `${event.uid||""}:${status.period||0}:${status.displayClock||""}`, period: status.period || 0, clock: status.displayClock || "", statusDesc: status.type?.description || "" };
          const teams = [];
          for (const competitor of comp.competitors || []) {
            const name = competitor.team?.displayName || "";
            if (!name) continue;
            const profile = buildTeamProfile(name, competitor.team?.abbreviation || "");
            teams.push(profile);
            for (const key of profile.keys) addEspnClockKey(clockMap, key, eventData);
          }
          if (teams.length) clockEvents.push({ ...eventData, teams });
        }
        espnClockData = clockMap;
        espnClockEvents = clockEvents;
        if (Object.keys(clockMap).length > 0) { try { renderLiveTab(); } catch(e) {} }
      } catch(e) {}
    }

    async function fetchEspnPlayerStats() {
      try {
        const today = currentEtDate().replace(/-/g, "");
        const sbRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${today}`);
        if (!sbRes.ok) return;
        const sbData = await sbRes.json();
        const newStats = {};
        for (const event of sbData.events || []) {
          const comp = event.competitions?.[0];
          if (!comp) continue;
          const stateType = comp.status?.type?.name || "";
          if (stateType !== "STATUS_IN_PROGRESS" && stateType !== "STATUS_HALFTIME" && stateType !== "STATUS_END_PERIOD") continue;
          const gameId = event.id;
          if (!gameId) continue;
          try {
            const sumRes = await fetch(`https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary?event=${gameId}`);
            if (!sumRes.ok) continue;
            const sumData = await sumRes.json();
            for (const teamBox of sumData.boxscore?.players || []) {
              const teamName = teamBox.team?.displayName || "";
              for (const statGroup of teamBox.statistics || []) {
                const labels = statGroup.labels || [];
                const ptsIdx = labels.indexOf("PTS"), rebIdx = labels.indexOf("REB"), astIdx = labels.indexOf("AST"), threeIdx = labels.indexOf("3PT");
                for (const athlete of statGroup.athletes || []) {
                  const playerName = athlete.athlete?.displayName || "";
                  if (!playerName) continue;
                  const stats = athlete.stats || [];
                  const parseThrees = v => { if (!v || v === "--") return 0; return parseInt(String(v).split("-")[0], 10) || 0; };
                  const parseStat = idx => { if (idx < 0 || !stats[idx] || stats[idx] === "--") return 0; return parseInt(stats[idx], 10) || 0; };
                  newStats[playerName] = { pts: parseStat(ptsIdx), reb: parseStat(rebIdx), ast: parseStat(astIdx), threes: threeIdx >= 0 ? parseThrees(stats[threeIdx]) : 0, team: teamName };
                }
              }
            }
          } catch(e) {}
        }
        if (Object.keys(newStats).length > 0) { livePlayerStats = newStats; try { renderLiveTab(); } catch(e) {} }
      } catch(e) {}
    }

    // === EVALUATION ENGINE ===
    function clamp(value, min, max) { return Math.min(Math.max(value, min), max); }

    function parseSpreadPick(pick) {
      const match = String(pick || "").match(/^(.+?)\s([+-]\d+(?:\.\d+)?)$/);
      if (!match) return null;
      const spread = Number.parseFloat(match[2]);
      if (!Number.isFinite(spread)) return null;
      return { team: match[1].trim(), spread };
    }

    function totalPickLine(pick) {
      const totalLine = parseFloat(String(pick || "").match(/(\d+(?:\.\d+)?)/)?.[1] || "");
      return Number.isFinite(totalLine) ? totalLine : null;
    }

    function totalPaceProgress(game) {
      const espn = getEspnClockForGame(game);
      const espnStatus = espnClockStatusKey(espn?.statusDesc || "");
      if (espnStatus === "final") return 1;
      if (espnStatus === "halftime") return 0.5;
      if (espn && espn.clock && espn.period) {
        const clockParts = espn.clock.split(":");
        const mins = parseInt(clockParts[0] || "0");
        const secs = parseInt(clockParts[1] || "0");
        const clockRemaining = mins + secs / 60;
        const elapsed = espn.period === 1 ? (20 - clockRemaining) : espn.period === 2 ? (40 - clockRemaining) : (40 + ((espn.period - 2) * 5) + (5 - clockRemaining));
        const totalMinutes = espn.period <= 2 ? 40 : 40 + ((espn.period - 2) * 5);
        return Math.max(0.01, Math.min(elapsed / totalMinutes, 1));
      }
      const start = parseGameStartDate(game);
      if (!start) return null;
      const elapsedMinutes = Math.max(0, (currentEtNow().getTime() - start.getTime()) / 60000);
      if (elapsedMinutes <= 0) return 0;
      return Math.max(0.01, Math.min(elapsedMinutes / 120, 1));
    }

    function spreadVisualizationData(pick, game) {
      const parsed = parseSpreadPick(pick);
      const teams = Array.isArray(game?.teams) ? game.teams : [];
      if (!parsed || teams.length < 2) return null;
      const pickTeamEntry = teams.find(t => teamMatches(t.name, parsed.team));
      const oppTeamEntry = teams.find(t => !teamMatches(t.name, parsed.team));
      if (!pickTeamEntry || !oppTeamEntry || !Number.isFinite(pickTeamEntry.score) || !Number.isFinite(oppTeamEntry.score)) return null;
      const scoreDiff = pickTeamEntry.score - oppTeamEntry.score;
      const coverMargin = scoreDiff + parsed.spread;
      const markerPos = 50 + (clamp(coverMargin, -20, 20) / 20) * 50;
      return {
        spreadLine: parsed.spread > 0 ? `+${parsed.spread}` : `${parsed.spread}`,
        currentMargin: scoreDiff > 0 ? `Winning by ${Math.abs(scoreDiff)}` : scoreDiff < 0 ? `Losing by ${Math.abs(scoreDiff)}` : "Tied",
        scoreDiff, coverMargin, covering: coverMargin > 0, thresholdPos: 50, markerPos,
        statusText: coverMargin > 0 ? `✅ Cover +${Math.abs(coverMargin).toFixed(1)}` : coverMargin < 0 ? `❌ Behind ${coverMargin.toFixed(1)}` : "⚠️ On the number"
      };
    }

    function totalVisualizationData(pick, game) {
      const line = totalPickLine(pick);
      const teams = Array.isArray(game?.teams) ? game.teams : [];
      if (!Number.isFinite(line) || teams.length < 2) return null;
      const currentTotal = teams.reduce((sum, t) => sum + (Number.isFinite(t.score) ? t.score : 0), 0);
      const remaining = line - currentTotal;
      const remainingPct = clamp((remaining / line) * 100, 0, 100);
      const filledPct = clamp((currentTotal / line) * 100, 0, 100);
      const pace = totalPaceProgress(game);
      const isUnder = /\b(?:under|u)\b/i.test(String(pick || ""));
      if (isUnder) {
        const st = remaining < 0 ? "danger" : remainingPct > 50 ? "safe" : remainingPct >= 25 ? "warning" : "danger";
        return { kind: "under", currentTotal, remaining, remainingPct, state: st, emoji: remaining < 0 ? "❌" : st === "safe" ? "✅" : "⚠️", statusText: remaining < 0 ? "❌ Over budget" : `${st === "safe" ? "✅" : "⚠️"} ${Math.round(remainingPct)}% budget left` };
      }
      const needed = Math.max(0, remaining);
      const projectedTotal = pace != null && pace > 0 ? currentTotal / pace : null;
      const hit = currentTotal >= line;
      const onPace = hit || (projectedTotal != null ? projectedTotal > line : false);
      const st = hit || onPace ? "on-pace" : "behind-pace";
      return { kind: "over", currentTotal, needed, filledPct, projectedTotal, hasProjection: projectedTotal != null, state: st, statusText: projectedTotal == null ? "⏳ Awaiting tip-off" : `Proj: ${projectedTotal.toFixed(0)} · ${onPace ? "On pace ✅" : "Behind ❌"}` };
    }

    function liveGameState(game) {
      if (!game || isGameCompleted(game)) return "completed";
      const start = parseGameStartDate(game);
      const now = currentEtNow();
      const rawStatus = String(game.status || "").toLowerCase();
      if (["in","live","halftime"].includes(rawStatus)) return "live";
      if (start && now.getTime() >= start.getTime()) return "live";
      return "upcoming";
    }

    function liveGameClockLabel(game) {
      if (!game) return "";
      const rawStatus = String(game.status || "").toLowerCase();
      if (rawStatus === "halftime") return "Halftime";
      if (rawStatus === "final" || rawStatus === "post" || game.completed) return "Final";
      const espn = getEspnClockForGame(game);
      if (espn) {
        const desc = espnClockStatusKey(espn.statusDesc || "");
        if (desc === "halftime") return "Halftime";
        if (desc === "final") return "Final";
        if (desc === "scheduled" || desc === "pre event" || desc === "pre game") return "";
        if (desc === "in progress" || desc === "end of period") {
          const half = espn.period === 1 ? "1H" : espn.period === 2 ? "2H" : `OT${espn.period - 2}`;
          return espn.clock ? `${half} · ${espn.clock}` : half;
        }
      }
      const start = parseGameStartDate(game);
      if (!start) return "";
      const now = currentEtNow();
      const elapsed = Math.max(0, Math.round((now.getTime() - start.getTime()) / 60000));
      if (elapsed < 45) return "First Half";
      if (elapsed < 60) return "Halftime";
      if (elapsed < 120) return "Second Half";
      return "Final";
    }

    function formatLiveScore(game) {
      if (!Array.isArray(game?.teams) || game.teams.length < 2) return "-";
      return `${game.teams[0].name} ${game.teams[0].score ?? "-"} - ${game.teams[1].name} ${game.teams[1].score ?? "-"}`;
    }

    function formatCompactLiveScore(game) {
      if (!Array.isArray(game?.teams) || game.teams.length < 2) return "-";
      return `${game.teams[0].score ?? "-"}-${game.teams[1].score ?? "-"}`;
    }

    function formatMobileLiveScore(game) {
      if (!Array.isArray(game?.teams) || game.teams.length < 2) return "-";
      return `${shortMobileTeamName(game.teams[0].name)} ${game.teams[0].score ?? "-"} · ${shortMobileTeamName(game.teams[1].name)} ${game.teams[1].score ?? "-"}`;
    }

    function formatSignedMargin(value) {
      if (!Number.isFinite(value)) return "0";
      const rounded = Math.round(value * 10) / 10;
      const absValue = Math.abs(rounded);
      const formatted = Number.isInteger(absValue) ? absValue.toFixed(0) : absValue.toFixed(1);
      return `${rounded >= 0 ? "+" : "-"}${formatted}`;
    }

    function formatAbsoluteNumber(value) {
      if (!Number.isFinite(value)) return "0";
      const rounded = Math.round(value * 10) / 10;
      return Number.isInteger(rounded) ? rounded.toFixed(0) : rounded.toFixed(1);
    }

    function mobileLiveHeaderMeta(entry) {
      return `${formatUnitsSecondary(entry.units)} · ${formatCurrency(unitToDollars(entry.units), { signed: false })} · LIVE <span class="mobile-live-dot">●</span>`;
    }

    function extractBetTeams(gameLabel) {
      return String(gameLabel || "").split(" vs ").map(t => t.trim()).filter(Boolean);
    }

    function parsePickTeams(pick) {
      const label = String(pick || "").trim();
      if (!label) return [];
      const totalTeams = label.match(/^(.+?)\s+(?:O|U|Over|Under)\s*\d/i);
      if (totalTeams) return totalTeams[1].split("/").map(t => t.trim()).filter(Boolean);
      const spreadTeams = label.match(/^(.+?)\s[+-]\d/);
      if (spreadTeams) return [spreadTeams[1].trim()];
      const mlTeams = label.match(/^(.+?)\s+ML$/i);
      if (mlTeams) return [mlTeams[1].trim()];
      return [];
    }

    function betMatchesGame(bet, gameTeams) {
      const betTeams = extractBetTeams(bet.game);
      return betTeams.length === 2 && betTeams.every(t => gameTeams.some(c => teamMatches(t, c)));
    }

    function pickMatchesGame(pick, gameTeams) {
      const pickTeams = parsePickTeams(pick);
      if (!pickTeams.length) return false;
      return pickTeams.every(t => gameTeams.some(c => teamMatches(t, c)));
    }

    function getOddsMarket(event, marketKey) {
      return event?.bookmakers?.find(b => b.key === BET_BOOK)?.markets?.find(m => m.key === marketKey) || null;
    }

    function findOddsOutcome(outcomes, teamName) {
      return (outcomes || []).find(o => teamMatches(o.name, teamName)) || null;
    }

    function parseOddsScoreGame(game) {
      const homeTeam = game?.home_team, awayTeam = game?.away_team;
      if (!homeTeam || !awayTeam) return null;
      const scores = Array.isArray(game.scores) ? game.scores : [];
      const scoreForTeam = teamName => {
        const raw = scores.find(e => teamMatches(e?.name, teamName))?.score;
        const parsed = raw == null || raw === "" ? NaN : Number(raw);
        return Number.isFinite(parsed) ? parsed : null;
      };
      const eventDate = game.commence_time || game.commenceTime || game.start_time || null;
      const completed = Boolean(game.completed);
      const status = String(game.status || game.state || (completed ? "post" : "scheduled")).toLowerCase();
      return { id: game.id || `${awayTeam}-${homeTeam}-${eventDate||""}`, date: isoDateInEt(eventDate) || currentEtDate(), eventDate, displayTime: completed ? "Final" : formatGameTime(eventDate), teams: [{ name: awayTeam, score: scoreForTeam(awayTeam) }, { name: homeTeam, score: scoreForTeam(homeTeam) }], period: game.period ?? null, clock: game.clock ?? null, status, completed, source: "odds-scores" };
    }

    function fallbackGameForBet(date, time) { return { date, displayTime: time || "Today", teams: [] }; }

    function findTodayLiveGameForTeams(teamNames) {
      if (!teamNames.length) return null;
      const today = currentEtDate();
      const matchesTeams = game => (game?.date === today && !isGameCompleted(game) && teamNames.every(t => game.teams?.some(c => teamMatches(t, c.name))));
      return liveScoreData.filter(matchesTeams).sort((a, b) => { const aL = liveGameState(a) === "live" ? 0 : 1, bL = liveGameState(b) === "live" ? 0 : 1; return aL - bL || parseTimeToMinutes(a.displayTime) - parseTimeToMinutes(b.displayTime); })[0] || null;
    }

    function evaluateLivePick(pick, type, game) {
      const propMatch = String(pick || "").match(/^(.+?)\s+(\d+(?:\.\d+)?)\+\s*(pts?|points?|reb(?:ounds?)?|ast|assists?|threes?|3pm?)$/i);
      if (propMatch) {
        const playerName = propMatch[1].trim();
        const target = parseFloat(propMatch[2]);
        const statKey = propMatch[3].toLowerCase();
        const statField = /^(reb|rebound)/.test(statKey) ? "reb" : /^(ast|assist)/.test(statKey) ? "ast" : /^(three|3pm)/.test(statKey) ? "threes" : "pts";
        const statLabel = statField === "threes" ? "threes" : statField;
        const playerStats = livePlayerStats[playerName];
        const isLiveGame = Object.keys(livePlayerStats).length > 0;
        if (playerStats) {
          const current = playerStats[statField] || 0;
          const covering = current >= target;
          return { state: covering ? "covering" : "not-covering", gameState: "live", isLive: true, hasScores: true, label: covering ? "Covering" : "Not Covering", scoreLabel: playerStats.team || playerName, compactScoreLabel: playerStats.team || playerName, statusText: `${covering ? "✅" : "🏀"} ${current}/${target} ${statLabel}`, summaryText: `${covering ? "Covering" : "Behind"} · ${current}/${target} ${statLabel}`, propData: { playerName, current, target, statField, statLabel, covering } };
        }
        return { state: "upcoming", gameState: isLiveGame ? "live" : "upcoming", isLive: false, hasScores: false, label: "Upcoming", scoreLabel: game?.displayTime || "Today", compactScoreLabel: game?.displayTime || "Today", statusText: `⏳ ${playerName} — waiting for stats` };
      }

      const teams = game?.teams || [];
      if (teams.length < 2) return { state: "upcoming", gameState: "upcoming", isLive: false, hasScores: false, label: "Upcoming", scoreLabel: game?.displayTime || "Today", compactScoreLabel: game?.displayTime || "Today", statusText: "⏳ Upcoming" };

      const gameState = liveGameState(game);
      const scoreLabel = gameState === "live" ? formatLiveScore(game) : (game.displayTime || "Today");
      const compactScoreLabel = gameState === "live" ? formatCompactLiveScore(game) : (game.displayTime || "Today");
      if (gameState !== "live") return { state: "upcoming", gameState, isLive: false, hasScores: false, label: gameState === "completed" ? "Final" : "Upcoming", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };

      const scores = teams.map(t => Number.isFinite(t.score) ? t.score : null);
      if (scores.some(s => s == null)) return { state: "upcoming", gameState, isLive: false, hasScores: false, label: "Live", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };

      const inferredType = type || inferBetTypeFromPick(pick);
      const mobileScoreLabel = formatMobileLiveScore(game);

      if (inferredType === "spread") {
        const match = String(pick || "").match(/^(.+?)\s([+-]\d+(?:\.\d+)?)$/);
        if (!match) return { state: "upcoming", gameState, isLive: false, hasScores: false, label: "Live", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };
        const pickTeam = match[1].trim(), spread = parseFloat(match[2]);
        const pickTeamEntry = teams.find(t => teamMatches(t.name, pickTeam));
        const oppTeamEntry = teams.find(t => !teamMatches(t.name, pickTeam));
        if (!pickTeamEntry || !oppTeamEntry) return { state: "upcoming", gameState, isLive: false, hasScores: false, label: "Live", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };
        const margin = pickTeamEntry.score - oppTeamEntry.score + spread;
        const covering = margin > 0;
        return { state: covering ? "covering" : "not-covering", gameState, isLive: true, hasScores: true, label: covering ? "Covering" : "Not Covering", scoreLabel, mobileScoreLabel, compactScoreLabel, statusText: `${covering ? "✅ Covering" : "❌ Behind"} ${formatSignedMargin(margin)}`, margin, barRatio: Math.min(Math.abs(margin) / 20, 1), summaryText: `${covering ? "Covering" : "Behind"} ${formatSignedMargin(margin)}` };
      }

      if (inferredType === "total") {
        const totalLine = parseFloat(String(pick || "").match(/(\d+(?:\.\d+)?)/)?.[1] || "");
        if (!Number.isFinite(totalLine)) return { state: "upcoming", gameState, isLive: false, hasScores: false, label: "Live", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };
        const totalPoints = scores.reduce((sum, s) => sum + s, 0);
        const pace = totalPaceProgress(game);
        const projectedLine = pace == null ? totalLine : totalLine * pace;
        const isUnder = /\b(?:under|u)\b/i.test(String(pick || ""));
        const covering = isUnder ? totalPoints < projectedLine : totalPoints > projectedLine;
        const progress = totalLine > 0 ? Math.max(0, Math.min(totalPoints / totalLine, 1)) : 0;
        const through = pace == null ? null : Math.round(pace * 100);
        return { state: covering ? "covering" : "not-covering", gameState, isLive: true, hasScores: true, label: covering ? "On Pace" : "Off Pace", scoreLabel, mobileScoreLabel, compactScoreLabel, statusText: covering ? "✅ On pace" : "❌ Off pace", currentTotal: totalPoints, line: totalLine, barRatio: progress, summaryText: `${covering ? "On pace" : "Off pace"}${through != null ? ` · ${through}% through` : ""}`, throughPercent: through };
      }

      const pickTeam = parsePickTeams(pick)[0];
      const pickTeamEntry = teams.find(t => teamMatches(t.name, pickTeam));
      const oppTeamEntry = teams.find(t => !teamMatches(t.name, pickTeam));
      if (!pickTeamEntry || !oppTeamEntry) return { state: "upcoming", gameState, isLive: false, hasScores: false, label: "Live", scoreLabel, compactScoreLabel, statusText: "⏳ Upcoming" };
      const margin = pickTeamEntry.score - oppTeamEntry.score;
      const covering = margin > 0;
      return { state: covering ? "covering" : "not-covering", gameState, isLive: true, hasScores: true, label: covering ? "Leading" : "Trailing", scoreLabel, mobileScoreLabel, compactScoreLabel, statusText: `${covering ? "✅ Leading" : "❌ Behind"} ${formatSignedMargin(margin)}`, margin, barRatio: Math.min(Math.abs(margin) / 20, 1), summaryText: `${covering ? "Leading" : "Behind"} ${formatSignedMargin(margin)}` };
    }

    function liveBetEntries() {
      const today = currentEtDate();
      const singleEntries = bets
        .filter(bet => isLiveTabEligibleResult(bet.result) && bet.date === today)
        .map(bet => {
          const teams = extractBetTeams(bet.game);
          const game = findTodayLiveGameForTeams(teams) || fallbackGameForBet(bet.date, bet.gameTime);
          const evaluation = evaluateLivePick(bet.pick, bet.type, game);
          return { sortTime: parseTimeToMinutes(game.displayTime), label: bet.game, title: bet.pick, pick: bet.pick, units: bet.units, game, evaluation, legs: [], isParlay: false };
        }).filter(Boolean);

      const parlayEntries = parlays
        .filter(parlay => isLiveTabEligibleResult(parlay.result) && (parlay.date === today || (parlay.legs || []).some(leg => bets.find(bet => bet.pick === leg && bet.date === today))))
        .map(parlay => {
          const legs = (parlay.legs || []).map(leg => {
            const legState = parlay.legStates?.[leg]?.result ?? bets.find(bet => bet.pick === leg)?.result ?? null;
            const teams = parsePickTeams(leg);
            const linkedBet = bets.find(bet => bet.pick === leg);
            const linkedTeamNames = parlay.linkedTeam ? parsePickTeams(parlay.linkedTeam) : [];
            const game = findTodayLiveGameForTeams(teams) || (linkedTeamNames.length ? findTodayLiveGameForTeams(linkedTeamNames) : null) || fallbackGameForBet(linkedBet?.date || parlay.date, linkedBet?.gameTime || parlay.gameTime);
            const liveEvaluation = evaluateLivePick(leg, inferBetTypeFromPick(leg), game);
            const resolvedState = legState === "win" || legState === "loss" || legState === "push"
              ? { state: legState, label: legState === "win" ? "Won" : legState === "loss" ? "Lost" : "Push", scoreLabel: parlay.legStates?.[leg]?.score || liveEvaluation.scoreLabel, compactScoreLabel: liveEvaluation.compactScoreLabel, statusText: `${mobileStatusEmoji(legState)} ${legState === "win" ? "Won" : legState === "loss" ? "Lost" : "Push"}` }
              : liveEvaluation;
            return { pick: leg, game, legState, evaluation: resolvedState };
          }).filter(Boolean);
          if (!legs.length) return null;
          const hasLoss = legs.some(l => l.evaluation.state === "loss" || l.evaluation.state === "not-covering");
          const hasLive = legs.some(l => l.evaluation.state === "covering" || l.evaluation.state === "not-covering");
          const allWon = legs.every(l => l.evaluation.state === "win");
          const anyResolved = legs.some(l => ["win","loss","push"].includes(l.evaluation.state));
          const linkedGame = parlay.linkedTeam ? findTodayLiveGameForTeams(parsePickTeams(parlay.linkedTeam)) : null;
          const linkedGameIsLive = linkedGame && (linkedGame.gameState === "in_progress" || linkedGame.gameState === "live");
          const allUpcoming = legs.every(l => l.evaluation.state === "upcoming");
          const evaluation = allWon ? { state: "win", label: "Won" } : hasLoss ? { state: hasLive ? "not-covering" : "loss", label: hasLive ? "Legs Live" : "Lost" } : hasLive ? { state: "covering", label: "Legs Live" } : (allUpcoming && linkedGameIsLive) ? { state: "covering", label: "Game Live", isLive: true, hasScores: true } : anyResolved ? { state: "upcoming", label: "Pending" } : { state: "upcoming", label: "Upcoming" };
          const parlayGame = linkedGameIsLive ? linkedGame : legs[0].game;
          const parlayScoreLabel = linkedGameIsLive ? (linkedGame.displayTime || "Live") : legs[0].game.displayTime || "Today";
          return { sortTime: Math.min(...legs.map(l => parseTimeToMinutes(l.game.displayTime))), label: `${parlay.id} · ${parlay.name}`, title: `${parlay.id} · ${parlay.name}`, pick: `${parlay.legs.length}-leg parlay`, units: parlay.units, game: parlayGame, evaluation: { ...evaluation, scoreLabel: parlayScoreLabel }, legs, isParlay: true };
        }).filter(Boolean);

      return [...singleEntries, ...parlayEntries].sort((a, b) => a.sortTime - b.sortTime || a.label.localeCompare(b.label));
    }

    // === LIVE BET MARKUP (shared mobile/desktop) ===
    function propBarMarkup(leg) {
      const prop = leg.evaluation.propData;
      if (!prop) return null;
      const pct = Math.min((prop.current / prop.target) * 100, 100);

    }

      if (entry.isParlay) {

        if (hasPropLegs) {

      }

    // === AI PICK CARD MARKUP ===
    function aiPickEditorMarkup(pick) {

    // === STATE PERSISTENCE ===
    function saveState() {
      const payload = { version: 3, bets: cloneData(bets), parlays: cloneData(parlays), aiPicks: cloneData(aiPicks), pickActions: { ...(state.pickActions || {}) } };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return;
        state.pickActions = saved.pickActions || {};
        const betMap = new Map((saved.bets || []).map(e => [e.id, e]));
        const parlayMap = new Map((saved.parlays || []).map(e => [e.id, e]));
        const hardcodedBetIds = new Set(BETS.map(b => b.id));
        bets = cloneData(BETS).map(bet => { const e = betMap.get(bet.id); return e ? { ...bet, ...e, result: sanitizeResult(e.result) } : bet; });
        (saved.bets || []).forEach(e => { if (!hardcodedBetIds.has(e.id) && Number.isFinite(Number(e.id))) bets.push({ ...e, result: sanitizeResult(e.result) }); });
        parlays = cloneData(PARLAYS).map(parlay => { const e = parlayMap.get(parlay.id); return e ? { ...parlay, ...e, result: sanitizeResult(e.result) } : parlay; });
        const aiPickMap = new Map((saved.aiPicks || []).map(e => [e.id, e]));
        aiPicks = cloneData(AI_PICKS).map(pick => { const e = aiPickMap.get(pick.id); if (!e) return pick; return { ...pick, expanded: Boolean(e.expanded), result: e.result === "declined" ? "declined" : sanitizeResult(e.result) }; });
      } catch(err) {
        bets = cloneData(BETS); parlays = cloneData(PARLAYS); aiPicks = cloneData(AI_PICKS); state.pickActions = {};
      }
      // Force-sync hardcoded parlay results
      const hardcodedParlayMap = new Map(PARLAYS.map(p => [p.id, p]));
      parlays.forEach(parlay => { const hc = hardcodedParlayMap.get(parlay.id); if (hc && hc.result && hc.result !== "placed" && (parlay.result === "placed" || parlay.result == null)) { parlay.result = hc.result; parlay.payout = hc.payout ?? 0; if (hc.legStates) parlay.legStates = { ...parlay.legStates, ...hc.legStates }; } });
      // Force-sync hardcoded bet results/payouts
      const hardcodedBetMap = new Map(BETS.map(b => [b.id, b]));
      bets.forEach(bet => { const hc = hardcodedBetMap.get(bet.id); if (!hc) return; if (hc.result && hc.result !== "placed" && (bet.result === "placed" || bet.result == null)) { bet.result = hc.result; bet.score = hc.score || bet.score; } if (hc.payout != null) bet.payout = hc.payout; if (hc.line != null) bet.line = hc.line; if (hc.units != null) bet.units = hc.units; });
      // Auto-settle dead parlays
      parlays.forEach(parlay => { if (parlay.result === "placed" || parlay.result == null) { const hasDeadLeg = Object.values(parlay.legStates || {}).some(ls => ls && (ls.result === "loss" || ls.result === "lost")); if (hasDeadLeg) { parlay.result = "loss"; parlay.payout = 0; } } });
      saveState();
    }

    // === LIVE SCORES FETCH ===
    const EXTRA_SCORE_SPORTS = ["soccer_france_ligue_one", "soccer_england_efl_cup"];

    async function fetchLiveScores() {
      try {
        // Fetch NCAAB + soccer leagues with open bets
        const allGames = [];
        const fetches = [SPORT, ...EXTRA_SCORE_SPORTS].map(async sk => {
          try {
            const r = await fetch(`${ODDS_API_BASE}/sports/${sk}/scores/?apiKey=${ODDS_API_KEY}&daysFrom=1`);
            if (r.ok) { const g = await r.json(); allGames.push(...g); }
          } catch(e) {}
        });
        await Promise.all(fetches);
        const games = allGames;
        liveScoreData = games.map(parseOddsScoreGame).filter(Boolean);
        let updated = false;
        for (const game of games) {
          if (!game.completed) continue;
          const scores = game.scores;
          if (!scores || scores.length < 2) continue;
          const home = game.home_team, away = game.away_team;
          const homeScore = parseInt(scores.find(s => s.name === home)?.score || 0, 10);
          const awayScore = parseInt(scores.find(s => s.name === away)?.score || 0, 10);
          const totalPoints = homeScore + awayScore;
          const scoreStr = `${away} ${awayScore} - ${home} ${homeScore}`;
          for (const bet of bets) {
            if (bet.result !== "placed") continue;
            const gameTeams = [away, home];
            if (!betMatchesGame(bet, gameTeams)) continue;
            bet.score = scoreStr;
            if (bet.type === "spread") {
              const pickParts = bet.pick.match(/(.+?)\s([+-][\d.]+)/);
              if (pickParts) { const pickTeam = pickParts[1].trim(), spread = parseFloat(pickParts[2]); const isHome = teamMatches(pickTeam, home); const pickScore = isHome ? homeScore : awayScore, oppScore = isHome ? awayScore : homeScore; const margin = pickScore - oppScore + spread; bet.result = margin > 0 ? "win" : margin < 0 ? "loss" : "push"; updated = true; }
            }
            if (bet.type === "total") {
              const isUnder = /under|u/i.test(bet.pick), totalLine = parseFloat(bet.pick.match(/[\d.]+/)?.[0] || 0);
              if (totalPoints < totalLine) bet.result = isUnder ? "win" : "loss";
              else if (totalPoints > totalLine) bet.result = isUnder ? "loss" : "win";
              else bet.result = "push";
              updated = true;
            }
          }
        }
        for (const parlay of parlays) {
          if (parlay.result !== "placed") continue;
          const legResults = parlay.legs.map(leg => bets.find(b => b.pick === leg)?.result ?? null);
          if (legResults.some(r => r === "loss")) { parlay.result = "loss"; updated = true; }
          else if (legResults.length && legResults.every(r => r === "win")) { parlay.result = "win"; updated = true; }
          else if (legResults.length && legResults.every(r => ["win","won","push"].includes(normalizeResult(r)))) { parlay.result = "push"; updated = true; }
        }
        if (updated) { saveState(); render(); return; }
        renderLiveTab();
      } catch(e) { console.log("Score fetch error:", e); }
    }

    // === EVENT HANDLERS ===
    function attachEvents() {
      // Tab switching (all [data-tab] buttons)
      document.addEventListener("click", e => {
        const tabBtn = e.target.closest("[data-tab]");
        if (tabBtn) { switchTab(tabBtn.dataset.tab); renderHeader(); return; }

        // Bets filter chips
        const filterBtn = e.target.closest("[data-mobile-filter]");
        if (filterBtn) { state.mobileAllBetsFilter = filterBtn.dataset.mobileFilter; renderBetsTab(); return; }

        // Bet card expand
        const expandBtn = e.target.closest("[data-expand-id]");
        if (expandBtn) {
          const id = String(expandBtn.dataset.expandId);
          if (state.expandedBets.has(id)) state.expandedBets.delete(id);
          else state.expandedBets.add(id);
          renderBetsTab();
          return;
        }

        // AI pick actions
        const aiPickExpandBtn = e.target.closest("[data-ai-pick-expand]");
        if (aiPickExpandBtn) { toggleAiPickExpanded(aiPickExpandBtn.dataset.aiPickExpand); return; }

        const aiPickPlaceBtn = e.target.closest("[data-ai-pick-place]");
        if (aiPickPlaceBtn) { openAiPickEditor(aiPickPlaceBtn.dataset.aiPickPlace); return; }

        const aiPickPassBtn = e.target.closest("[data-ai-pick-pass]");
        if (aiPickPassBtn) { passAiPick(aiPickPassBtn.dataset.aiPickPass); return; }

        const aiPickConfirmBtn = e.target.closest("[data-ai-pick-confirm]");
        if (aiPickConfirmBtn) { confirmAiPickPlacement(aiPickConfirmBtn.dataset.aiPickConfirm); return; }

        const aiPickCancelBtn = e.target.closest("[data-ai-pick-cancel]");
        if (aiPickCancelBtn) { cancelAiPickEditor(aiPickCancelBtn.dataset.aiPickCancel); return; }

        const aiPicksShowAllBtn = e.target.closest("[data-ai-picks-show-all]");
        if (aiPicksShowAllBtn) { toggleShowAllPassedPicks(); return; }
      });

      // Input changes for pick editor
      document.addEventListener("input", e => {
        const input = e.target.closest("[data-ai-pick-input][data-ai-pick-field]");
        if (!input) return;
        updateAiPickDraft(input.dataset.aiPickInput, input.dataset.aiPickField, input.value);
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", e => {
        if (e.key === "Escape") {
          if (state.editingAiPickId != null) { cancelAiPickEditor(state.editingAiPickId); return; }
        }
        if (e.key === "Enter") {
          const input = e.target.closest("[data-ai-pick-input]");
          if (!input) return;
          e.preventDefault();
          confirmAiPickPlacement(input.dataset.aiPickInput);
        }
      });
    }

    // === INITIALIZATION ===
    function init() {
      loadState();
      attachEvents();
      render();
      fetchOddsData();
      fetchLiveScores();
      fetchEspnClock();
      fetchEspnPlayerStats();
      setInterval(fetchLiveScores, 180000);    // 3 minutes
      setInterval(fetchOddsData, 300000);       // 5 minutes
      setInterval(fetchEspnClock, 30000);       // 30 seconds
      setInterval(fetchEspnPlayerStats, 30000); // 30 seconds
    }

    init();
  </script>
</body>
</html>
