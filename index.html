    // === RENDER: BETS TAB ===
    function renderBetsTab() {
      const container = document.getElementById("betsContent");
      if (!container) return;

      const filterOpts = [
        { key: "all", label: "All" },
        { key: "wins", label: "Won" },
        { key: "losses", label: "Lost" },
        { key: "placed", label: "Open" },
        { key: "parlays", label: "Parlays" }
      ];

      const allItems = allTickets().map(tableTicket);

      const filteredItems = allItems.filter(item => {
        if (state.mobileAllBetsFilter === "all") return true;
        if (state.mobileAllBetsFilter === "wins") return isWin(item.result);
        if (state.mobileAllBetsFilter === "losses") return isLoss(item.result);
        if (state.mobileAllBetsFilter === "placed") return item.result === "placed";
        if (state.mobileAllBetsFilter === "parlays") return item.ticketType === "parlay";
        return true;
      }).sort((a, b) => b.date.localeCompare(a.date) || String(b.id).localeCompare(String(a.id), undefined, { numeric: true }));

      // Count for chips
      const counts = {
        all: allItems.length,
        wins: allItems.filter(i => isWin(i.result)).length,
        losses: allItems.filter(i => isLoss(i.result)).length,
        placed: allItems.filter(i => i.result === "placed").length,
        parlays: allItems.filter(i => i.ticketType === "parlay").length
      };

      // Group by date
      const grouped = new Map();
      filteredItems.forEach(item => {
        if (!grouped.has(item.date)) grouped.set(item.date, []);
        grouped.get(item.date).push(item);
      });

      const betCardsHtml = [...grouped.entries()].sort((a,b) => b[0].localeCompare(a[0])).map(([date, items]) => {
        const wins = items.filter(i => isWin(i.result)).length;
        const losses = items.filter(i => isLoss(i.result)).length;
        const dateLabel = new Date(`${date}T12:00:00`).toLocaleDateString(undefined, { month: "short", day: "numeric" });

        const cards = items.map(bet => {
          const expanded = state.expandedBets.has(String(bet.id));
          const profit = ticketProfit(bet);
          const isParlay = bet.ticketType === "parlay";
          const sport = bet.sport;
          return `<article class="bet-card" data-expand-id="${bet.id}">
            <div class="bet-card-main">
              <span class="bet-sport-icon">${sport === "soccer" ? "⚽" : "🏀"}</span>
              <div class="bet-body">
                <div class="bet-pick">${mobileResultEmoji(bet.result)} ${isParlay ? bet.label : bet.pick}</div>
                <div class="bet-meta">${[bet.gameTime, formatUnitsSecondary(bet.units), formatLineValue(bet.line)].filter(Boolean).join(" · ")}</div>
                ${bet.score && !isParlay ? `<div class="bet-score">${bet.score}</div>` : ""}
              </div>
              <div class="bet-card-right">
                <div class="bet-pnl ${mobileStatusClassForResult(bet.result)}">${formatCurrency(profit)}</div>
                <div class="bet-result-chip ${statusChipClass(bet.result)}">${statusLabel(bet.result)}</div>
              </div>
            </div>
            ${expanded ? `<div class="bet-card-details">
              ${isParlay ? `<div class="bet-detail-row"><div class="bet-detail-key">Legs</div><div class="bet-detail-val">${bet.legs.map(leg => { const ls = parlayLegState(bet, leg); return ls.icon + " " + leg; }).join(" · ")}</div></div>` : ""}
              <div class="bet-detail-row"><div class="bet-detail-key">Notes</div><div class="bet-detail-val">${bet.notes || "—"}</div></div>
              <div class="bet-detail-row"><div class="bet-detail-key">Confidence</div><div class="bet-detail-val">${capitalize(bet.confidence || "—")}</div></div>
              ${!isParlay && bet.kenpomGap != null ? `<div class="bet-detail-row"><div class="bet-detail-key">KP Gap</div><div class="bet-detail-val">${bet.kenpomGap.toFixed(1)} pts</div></div>` : ""}
              ${bet.score ? `<div class="bet-detail-row"><div class="bet-detail-key">Score</div><div class="bet-detail-val">${bet.score}</div></div>` : ""}
            </div>` : ""}

        return `<div class="day-header"><div class="day-header-label">${dateLabel}</div><div class="day-header-line"></div><div class="day-header-record">${wins}W-${losses}L</div></div>${cards}`;

      container.innerHTML = `

        </div>

    // === PLOTLY CHART HELPERS ===
    const PLOTLY_BASE_LAYOUT = {
      paper_bgcolor: 'transparent',
      plot_bgcolor: 'transparent',
      font: { family: 'DM Sans, sans-serif', color: '#8b8d97', size: 11 },
      margin: { l: 48, r: 16, t: 24, b: 44 },
      xaxis: { gridcolor: 'rgba(255,255,255,0.04)', linecolor: 'rgba(255,255,255,0.06)', tickcolor: 'rgba(255,255,255,0.06)', zerolinecolor: 'rgba(255,255,255,0.08)' },
      yaxis: { gridcolor: 'rgba(255,255,255,0.04)', linecolor: 'rgba(255,255,255,0.06)', tickcolor: 'rgba(255,255,255,0.06)', zerolinecolor: 'rgba(255,255,255,0.08)' }
    };

    const PLOTLY_CONFIG = { displayModeBar: false, responsive: true };

    function calcDailyPnl() {
      const grouped = new Map();
      allTickets().forEach(t => {
        if (!grouped.has(t.date)) grouped.set(t.date, []);
        grouped.get(t.date).push(t);
      });
      return [...grouped.entries()]
        .sort((a,b) => a[0].localeCompare(b[0]))
        .map(([date, items]) => ({
          date,
          label: new Date(`${date}T12:00:00`).toLocaleDateString(undefined, { month: "short", day: "numeric" }),
          pnl: items.reduce((sum, t) => sum + ticketProfit(t), 0),
          wins: items.filter(i => isWin(i.result)).length,
          losses: items.filter(i => isLoss(i.result)).length
        }));
    }

    function calcBankrollByDay() {
      const daily = calcDailyPnl();
      let running = STARTING_BANKROLL + BANKROLL_CORRECTION;
      return daily.map(d => {
        running += d.pnl;
        return { label: d.label, bankroll: running };
      });
    }

    function renderBankrollChart(containerId) {
      const el = document.getElementById(containerId);
      if (!el || typeof Plotly === 'undefined') return;
      const data = calcBankrollByDay();
      if (!data.length) return;
      const x = data.map(d => d.label);
      const y = data.map(d => d.bankroll);
      Plotly.newPlot(el, [{
        x, y,
        type: 'scatter',
        mode: 'lines+markers',
        line: { color: '#00e676', width: 2.5, shape: 'spline' },
        marker: { color: '#00e676', size: 7, line: { color: '#08090d', width: 2 } },
        fill: 'tozeroy',
        fillcolor: 'rgba(0,230,118,0.07)',
        hovertemplate: '<b>%{x}</b><br>$%{y:.2f}<extra></extra>'
      }], {
        ...PLOTLY_BASE_LAYOUT,
        height: 200,
        yaxis: { ...PLOTLY_BASE_LAYOUT.yaxis, tickprefix: '$', tickformat: '.0f' },
        shapes: [{
          type: 'line',
          x0: 0, x1: 1, xref: 'paper',
          y0: STARTING_BANKROLL + BANKROLL_CORRECTION,
          y1: STARTING_BANKROLL + BANKROLL_CORRECTION,
          line: { color: 'rgba(255,255,255,0.15)', width: 1, dash: 'dot' }
        }]
      }, PLOTLY_CONFIG);
    }

    function renderDailyPnlChart(containerId) {
      const el = document.getElementById(containerId);
      if (!el || typeof Plotly === 'undefined') return;
      const daily = calcDailyPnl();
      if (!daily.length) return;
      const x = daily.map(d => d.label);
      const y = daily.map(d => d.pnl);
      const colors = y.map(v => v >= 0 ? '#00e676' : '#ff3d57');
      Plotly.newPlot(el, [{
        x, y,
        type: 'bar',
        marker: { color: colors, opacity: 0.85 },
        hovertemplate: '<b>%{x}</b><br>%{y:+.2f}<extra></extra>'
      }], {
        ...PLOTLY_BASE_LAYOUT,
        height: 180,
        yaxis: { ...PLOTLY_BASE_LAYOUT.yaxis, tickprefix: '$', zeroline: true, zerolinecolor: 'rgba(255,255,255,0.15)', zerolinewidth: 1 }
      }, PLOTLY_CONFIG);
    }

    function renderRoiByTypeChart(containerId) {
      const el = document.getElementById(containerId);
      if (!el || typeof Plotly === 'undefined') return;
      const typeStats = groupedStats(allTickets(), t => t.type, ["spread", "total", "ml", "parlay"]);
      const filtered = typeStats.filter(s => s.count > 0);
      if (!filtered.length) return;
      const labels = filtered.map(s => s.label);
      const values = filtered.map(s => {
        const settled = allTickets().filter(t => t.type === s.key && isSettled(t.result));
        const risked = settled.reduce((sum, t) => sum + unitToDollars(t.units), 0);
        const profit = settled.reduce((sum, t) => sum + ticketProfit(t), 0);
        return risked > 0 ? (profit / risked) * 100 : 0;
      });
      const colors = values.map(v => v >= 0 ? '#00e676' : '#ff3d57');
      Plotly.newPlot(el, [{
        x: values,
        y: labels,
        type: 'bar',
        orientation: 'h',
        marker: { color: colors, opacity: 0.85 },
        hovertemplate: '<b>%{y}</b><br>ROI: %{x:.1f}%<extra></extra>'
      }], {
        ...PLOTLY_BASE_LAYOUT,
        height: 180,
        margin: { ...PLOTLY_BASE_LAYOUT.margin, l: 72 },
        xaxis: { ...PLOTLY_BASE_LAYOUT.xaxis, ticksuffix: '%', zeroline: true, zerolinecolor: 'rgba(255,255,255,0.15)', zerolinewidth: 1 },
        yaxis: { ...PLOTLY_BASE_LAYOUT.yaxis }
      }, PLOTLY_CONFIG);
    }

    function renderStatsCharts() {
      renderBankrollChart('chart-bankroll');
      renderDailyPnlChart('chart-daily-pnl');
      renderRoiByTypeChart('chart-roi-type');
    }

    // === RENDER: STATS TAB ===
    function renderStatsTab() {
      const container = document.getElementById("statsContent");
      if (!container) return;
      const summary = summarize();
      const bankroll = STARTING_BANKROLL + summary.realized + BANKROLL_CORRECTION;
      const overall = overallRecord(allTickets());
      const isUp = bankroll > STARTING_BANKROLL;
      const isDown = bankroll < STARTING_BANKROLL;

      // Streak
      const settled = allTickets().filter(t => isSettled(t.result)).sort((a, b) => `${a.date}${a.gameTime||""}`.localeCompare(`${b.date}${b.gameTime||""}`));
      let currentStreak = 0, currentStreakType = null, bestWinStreak = 0, tmpWin = 0, worstLossStreak = 0, tmpLoss = 0;
      for (const t of settled) {
        const w = isWin(t.result);
        if (currentStreakType === null) { currentStreakType = w; currentStreak = 1; }
        else if (w === currentStreakType) { currentStreak++; }
        else { currentStreakType = w; currentStreak = 1; }
        if (w) { tmpWin++; tmpLoss = 0; bestWinStreak = Math.max(bestWinStreak, tmpWin); }
        else { tmpLoss++; tmpWin = 0; worstLossStreak = Math.max(worstLossStreak, tmpLoss); }
      }
      const streakLabel = settled.length ? `${currentStreakType ? "W" : "L"}${currentStreak}` : "—";

      // Type stats
      const typeStats = groupedStats(allTickets(), t => t.type, ["spread", "total", "ml", "parlay"]);
      const maxAbsProfit = Math.max(...typeStats.map(s => Math.abs(s.profit)), 1);

      container.innerHTML = `
        <div class="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-label">Bankroll</div>
            <div class="kpi-value ${isUp ? "green" : isDown ? "red" : ""}">${formatCurrency(bankroll, { signed: false })}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Record</div>
            <div class="kpi-value">${overall.wins}–${overall.losses}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">ROI</div>
            <div class="kpi-value ${summary.roi >= 0 ? "green" : "red"}">${formatPercent(summary.roi)}</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-label">Win Rate</div>
            <div class="kpi-value">${formatPercent(summary.winRate)}</div>
          </div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">Bankroll Curve</div>
          <div class="chart-container" id="chart-bankroll"></div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">Daily P&amp;L</div>
          <div class="chart-container" id="chart-daily-pnl"></div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">ROI by Bet Type</div>
          <div class="chart-container" id="chart-roi-type"></div>
          <div style="margin-top:14px">
            ${typeStats.filter(s => s.count > 0).map(stat => `
              <div class="type-row">
                <div class="type-row-label">${stat.label}</div>
                <div class="type-row-record">${stat.record}</div>
                <div class="type-bar-track"><div class="type-bar-fill ${stat.profit >= 0 ? "positive" : "negative"}" style="width:${Math.min((Math.abs(stat.profit)/maxAbsProfit)*100,100).toFixed(1)}%"></div></div>
                <div class="type-row-pnl ${stat.profit >= 0 ? "positive" : "negative"}">${formatCurrency(stat.profit)}</div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="stats-section">
          <div class="stats-section-title">Streak Tracker</div>
          <div class="streak-block">
            <div class="streak-current-big ${currentStreakType ? "green" : "red"}">${streakLabel}</div>
            <div class="streak-sub">Best: W${bestWinStreak} · Worst: L${worstLossStreak} · ${summary.settledCount} settled</div>
          </div>
        </div>
      `;

      // Render Plotly charts after DOM is ready
      requestAnimationFrame(() => renderStatsCharts());
    }

    // === FULL RENDER ===
    function render() {
      renderHeader();
      renderLiveTab();
      renderPicksTab();
      renderBetsTab();
      renderStatsTab();
      renderFloatingBetControls();
    }

    // === EVENT HANDLERS ===
    function attachEvents() {
      document.addEventListener("click", e => {
        // Tab switching
        const tabBtn = e.target.closest("[data-tab]");
        if (tabBtn) { switchTab(tabBtn.dataset.tab); renderHeader(); return; }

        // Bets filter
        const filterBtn = e.target.closest("[data-mobile-filter]");
        if (filterBtn) { state.mobileAllBetsFilter = filterBtn.dataset.mobileFilter; renderBetsTab(); return; }

        // Bet card expand
        const expandBtn = e.target.closest("[data-expand-id]");
        if (expandBtn) {
          const id = String(expandBtn.dataset.expandId);
          if (state.expandedBets.has(id)) state.expandedBets.delete(id); else state.expandedBets.add(id);
          renderBetsTab(); return;
        }

        // Date pill in picks
        const datePillBtn = e.target.closest("[data-pick-date]");
        if (datePillBtn) { state.selectedPickDate = datePillBtn.dataset.pickDate; renderPicksTab(); return; }

        // AI pick actions
        const aiPickExpandBtn = e.target.closest("[data-ai-pick-expand]");
        if (aiPickExpandBtn) { toggleAiPickExpanded(aiPickExpandBtn.dataset.aiPickExpand); return; }

        const aiPickPlaceBtn = e.target.closest("[data-ai-pick-place]");
        if (aiPickPlaceBtn) { placeAiPick(aiPickPlaceBtn.dataset.aiPickPlace); return; }

        const aiPickPassBtn = e.target.closest("[data-ai-pick-pass]");
        if (aiPickPassBtn) { passAiPick(aiPickPassBtn.dataset.aiPickPass); return; }

        const aiPicksShowAllBtn = e.target.closest("[data-ai-picks-show-all]");
        if (aiPicksShowAllBtn) { toggleShowAllPassedPicks(); return; }

        const addBetOpenBtn = e.target.closest("[data-add-bet-open]");
        if (addBetOpenBtn) { openAddBetModal(); return; }

        const addBetCloseBtn = e.target.closest("[data-add-bet-close]");
        if (addBetCloseBtn) { closeAddBetModal(); return; }

        const addBetOverlay = e.target.closest("[data-add-bet-overlay]");
        if (addBetOverlay && e.target === addBetOverlay) { closeAddBetModal(); return; }
      });

      document.addEventListener("input", e => {
        const addBetField = e.target.closest("[data-add-bet-field]");
        if (addBetField) updateAddBetField(addBetField.dataset.addBetField, addBetField.value);
      });

      document.addEventListener("change", e => {
        const addBetField = e.target.closest("[data-add-bet-field]");
        if (addBetField) updateAddBetField(addBetField.dataset.addBetField, addBetField.value);
      });

      document.addEventListener("submit", e => {
        const addBetForm = e.target.closest("[data-add-bet-form]");
        if (!addBetForm) return;
        e.preventDefault();
        submitAddBetForm();
      });

      // Keyboard
      document.addEventListener("keydown", e => {
        if (e.key === "Escape" && state.isAddBetModalOpen) { closeAddBetModal(); }
      });
    }

    // === INIT ===
    async function init() {
      await loadState();
      attachEvents();
      render();
      fetchOddsData();
      fetchLiveScores();
      fetchEspnClock();
      fetchEspnPlayerStats();
      setInterval(fetchLiveScores, 180000);
      setInterval(fetchOddsData, 300000);
      setInterval(fetchEspnClock, 30000);
      setInterval(fetchEspnPlayerStats, 30000);
    }

    init();
  </script>
</body>
</html>
