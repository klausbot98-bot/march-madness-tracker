<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kevin's Bet Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #06080d;
      --bg-2: #0d1118;
      --panel: rgba(17, 22, 31, 0.88);
      --panel-2: rgba(22, 28, 39, 0.94);
      --panel-3: rgba(30, 37, 49, 0.98);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --text: #f5f7fb;
      --muted: #9fa8ba;
      --muted-2: #748095;
      --green: #33d17a;
      --green-soft: rgba(51, 209, 122, 0.16);
      --red: #ff5d73;
      --red-soft: rgba(255, 93, 115, 0.16);
      --amber: #f3b63f;
      --amber-soft: rgba(243, 182, 63, 0.16);
      --blue: #69a4ff;
      --blue-soft: rgba(105, 164, 255, 0.18);
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
      --radius-sm: 14px;
      --radius-md: 20px;
      --radius-lg: 28px;
      --font-display: "Space Grotesk", sans-serif;
      --font-body: "Instrument Sans", sans-serif;
      --header-h: 84px;
      --nav-h: 84px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      background:
        radial-gradient(circle at top, rgba(41, 77, 133, 0.22), transparent 28%),
        radial-gradient(circle at bottom right, rgba(16, 96, 57, 0.18), transparent 26%),
        linear-gradient(180deg, #05070b 0%, #0a0e14 52%, #05070b 100%);
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      background: transparent;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.045) 0.75px, transparent 0.75px);
      background-size: 18px 18px;
      opacity: 0.16;
      pointer-events: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      padding: 14px 16px;
      min-height: 52px;
      outline: 0;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(105, 164, 255, 0.65);
      box-shadow: 0 0 0 4px rgba(105, 164, 255, 0.12);
    }

    #app {
      width: min(100%, 540px);
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: max(18px, env(safe-area-inset-top)) 18px 12px;
      backdrop-filter: blur(20px);
      background: linear-gradient(180deg, rgba(6, 8, 13, 0.92), rgba(6, 8, 13, 0.58));
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .topbar-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .brand {
      font-family: var(--font-display);
      font-size: 1.28rem;
      font-weight: 700;
      line-height: 1.05;
    }

    .subline {
      color: var(--muted);
      font-size: 0.88rem;
      margin-top: 4px;
    }

    .bankroll-box {
      min-width: 146px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border-radius: 22px;
      padding: 12px 14px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      text-align: right;
    }

    .bankroll-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .bankroll-value {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.05;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    .bankroll-meta {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .bankroll-value.up,
    .stat-value.up,
    .pill.up {
      color: var(--green);
    }

    .bankroll-value.down,
    .stat-value.down,
    .pill.down {
      color: var(--red);
    }

    .surface {
      padding: 14px 18px 0;
    }

    .hero-card,
    .panel,
    .ticket,
    .stat-card,
    .empty,
    .mini-card {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: var(--radius-md);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
    }

    .hero-card {
      padding: 18px;
      display: grid;
      gap: 16px;
      background:
        linear-gradient(145deg, rgba(105, 164, 255, 0.14), transparent 40%),
        linear-gradient(180deg, rgba(20, 26, 37, 0.96), rgba(14, 18, 26, 0.92));
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: 1.32rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .hero-copy {
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .hero-actions,
    .panel-actions,
    .sheet-actions,
    .ticket-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 52px;
      border-radius: 16px;
      padding: 0 18px;
      font-weight: 700;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(180deg, #56df92, #1fb86d);
      color: #05110b;
      box-shadow: 0 12px 28px rgba(31, 184, 109, 0.22);
    }

    .btn-secondary {
      border: 1px solid var(--border-strong);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn-danger {
      background: linear-gradient(180deg, #ff7b8d, #ff5d73);
      color: #fff;
    }

    .btn-ghost {
      color: var(--muted);
      min-height: 44px;
      padding: 0 12px;
    }

    .btn-block {
      width: 100%;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat-card,
    .mini-card {
      padding: 14px;
    }

    .stat-label,
    .mini-label,
    .group-label,
    .field-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 700;
    }

    .stat-value,
    .mini-value {
      margin-top: 8px;
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }

    .stat-copy,
    .mini-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.85rem;
      line-height: 1.35;
    }

    .section {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-copy {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .pill-row::-webkit-scrollbar {
      display: none;
    }

    .pill {
      flex: 0 0 auto;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.03);
      font-size: 0.86rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .pill.active {
      background: var(--blue-soft);
      border-color: rgba(105, 164, 255, 0.45);
      color: #dbe8ff;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .date-group {
      display: grid;
      gap: 10px;
    }

    .group-label {
      padding: 2px 2px 0;
    }

    .ticket {
      width: 100%;
      text-align: left;
      padding: 16px;
      display: grid;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .ticket::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(105, 164, 255, 0.11), transparent 34%, transparent);
      opacity: 0.8;
    }

    .ticket-head,
    .ticket-foot,
    .inline-row,
    .sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .ticket-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .chip.pending {
      color: #dbe8ff;
      border-color: rgba(105, 164, 255, 0.42);
      background: var(--blue-soft);
    }

    .chip.win {
      color: #baf0cf;
      border-color: rgba(51, 209, 122, 0.4);
      background: var(--green-soft);
    }

    .chip.loss {
      color: #ffc9d0;
      border-color: rgba(255, 93, 115, 0.42);
      background: var(--red-soft);
    }

    .chip.push,
    .chip.parlay {
      color: #ffe2a9;
      border-color: rgba(243, 182, 63, 0.42);
      background: var(--amber-soft);
    }

    .chip.manual {
      color: #d8e2f5;
      border-color: var(--border);
      background: rgba(255, 255, 255, 0.05);
    }

    .ticket-title {
      font-family: var(--font-display);
      font-size: 1.08rem;
      line-height: 1.14;
      letter-spacing: -0.02em;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .ticket-subtitle,
    .ticket-copy,
    .field-copy,
    .empty-copy {
      color: var(--muted);
      line-height: 1.4;
      position: relative;
      z-index: 1;
    }

    .ticket-subtitle {
      font-size: 0.9rem;
      margin-top: 4px;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .ticket-stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .ticket-stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 700;
    }

    .ticket-stat-value {
      font-family: var(--font-display);
      font-size: 1rem;
      margin-top: 6px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .ticket-copy {
      font-size: 0.9rem;
    }

    .empty {
      padding: 26px 18px;
      text-align: center;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .fab {
      position: fixed;
      right: max(18px, calc((100vw - min(100vw, 540px)) / 2 + 18px));
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 20px);
      z-index: 25;
      width: 62px;
      height: 62px;
      border-radius: 24px;
      background: linear-gradient(180deg, #74b0ff, #4b88ec);
      color: white;
      box-shadow: 0 22px 40px rgba(34, 84, 179, 0.34);
      font-family: var(--font-display);
      font-size: 1.7rem;
      font-weight: 700;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 540px);
      z-index: 28;
      padding: 10px 12px calc(env(safe-area-inset-bottom) + 10px);
      background: linear-gradient(180deg, rgba(6, 8, 13, 0.28), rgba(6, 8, 13, 0.96) 44%);
      backdrop-filter: blur(16px);
    }

    .bottom-nav-inner {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(14, 18, 25, 0.96);
      padding: 8px;
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .nav-btn {
      min-height: 58px;
      border-radius: 18px;
      display: grid;
      gap: 3px;
      place-items: center;
      color: var(--muted-2);
      position: relative;
      padding: 8px 4px;
    }

    .nav-btn.active {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .nav-icon {
      font-size: 1.15rem;
      line-height: 1;
    }

    .nav-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
    }

    .badge {
      position: absolute;
      top: 6px;
      right: 10px;
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      padding: 0 5px;
      background: var(--red);
      color: white;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .sheet-layer {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
    }

    .sheet-layer.open {
      display: block;
    }

    .sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(3, 5, 8, 0.72);
      backdrop-filter: blur(8px);
    }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 540px;
      margin: 0 auto;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      background:
        linear-gradient(180deg, rgba(105, 164, 255, 0.12), transparent 20%),
        linear-gradient(180deg, rgba(22, 28, 39, 0.98), rgba(14, 18, 26, 0.98));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 14px 18px calc(env(safe-area-inset-bottom) + 20px);
      max-height: 88vh;
      overflow-y: auto;
    }

    .sheet-handle {
      width: 52px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      margin: 0 auto 14px;
    }

    .sheet-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .sheet-copy {
      color: var(--muted);
      line-height: 1.4;
      margin-top: 6px;
      font-size: 0.92rem;
    }

    .sheet-body {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field-copy {
      font-size: 0.85rem;
    }

    .sheet-summary {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .summary-row strong {
      color: var(--text);
      font-weight: 700;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .seg-btn {
      min-height: 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .seg-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-color: var(--border-strong);
    }

    .toast-wrap {
      position: fixed;
      left: 50%;
      top: max(92px, calc(env(safe-area-inset-top) + 74px));
      transform: translateX(-50%);
      z-index: 50;
      width: min(92vw, 440px);
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(14, 18, 25, 0.96);
      box-shadow: var(--shadow);
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .toast.success {
      border-color: rgba(51, 209, 122, 0.3);
    }

    .toast.error {
      border-color: rgba(255, 93, 115, 0.3);
    }

    .loading {
      padding: 26px 18px;
      color: var(--muted);
      text-align: center;
    }

    .desktop-only {
      display: none;
    }

    @media (min-width: 720px) {
      #app {
        width: min(100%, 900px);
      }

      .surface {
        padding-inline: 24px;
      }

      .hero-grid {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 12px;
      }

      .bottom-nav {
        width: min(100%, 900px);
      }

      .sheet {
        max-width: 640px;
      }

      .desktop-only {
        display: block;
      }
    }
  
    .pick-pass-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted, #888);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      margin-left: 8px;
    }
    .pick-pass-btn:active {
      background: rgba(255,60,60,0.15);
      color: #ff4444;
    }

    </style>
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar"></header>
    <main class="surface" id="main"></main>
    <button class="fab" id="manualFab" type="button" aria-label="Add manual bet">+</button>
    <nav class="bottom-nav" id="bottomNav"></nav>
  </div>

  <div class="sheet-layer" id="sheetLayer"></div>
  <div class="toast-wrap" id="toastWrap"></div>

  <script>
    const API = {
      data: "/api/data",
      bankroll: "/api/bankroll",
      bets: "/api/bets",
      picksPlace: "/api/picks/place",
      picks: "/api/picks",
      parlays: "/api/parlays",
      settle: "/api/settle"
    };

    const LOCAL_KEY = "bet-tracker-state-v2";
    const PASSED_KEY = "bet-tracker-passed-v1";
    const UNIT_SIZE = 25;
    const DEFAULT_DATA = { meta: { openingCash: 199.88 }, bets: [], parlays: [], aiPicks: [] };

    const state = {
      activeTab: "picks",
      loading: true,
      syncing: false,
      error: "",
      data: structuredClone(DEFAULT_DATA),
      historyFilter: "all",
      openFilter: "all",
      toasts: [],
      sheet: null
    };

    const refs = {
      topbar: document.getElementById("topbar"),
      main: document.getElementById("main"),
      bottomNav: document.getElementById("bottomNav"),
      sheetLayer: document.getElementById("sheetLayer"),
      toastWrap: document.getElementById("toastWrap"),
      manualFab: document.getElementById("manualFab")
    };

    const formatter = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });
    const dateFormatter = new Intl.DateTimeFormat("en-US", { month: "short", day: "numeric", weekday: "short" });

    init();

    async function init() {
      bindEvents();
      await loadData();
    }

    function bindEvents() {
      document.addEventListener("click", handleClick);
      document.addEventListener("input", handleInput);
      document.addEventListener("change", handleInput);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && state.sheet) closeSheet();
      });
      refs.manualFab.addEventListener("click", () => openManualSheet());
    }

    async function loadData() {
      state.loading = true;
      state.error = "";
      render();
      try {
        const serverData = await apiJson(API.data);
        const localData = loadLocal();
        if (localData && localData.bets) {
          // Local is authoritative for mutations (pass, place, manual add)
          // But merge any NEW server aiPicks not already in local
          const localPickIds = new Set((localData.aiPicks || []).map(p => String(p.id)));
          const newServerPicks = (serverData.aiPicks || []).filter(p => !localPickIds.has(String(p.id)));
          // If local has fewer picks than server (user passed some), keep local's shorter list
          // But add genuinely new server picks that local hasn't seen
          const mergedPicks = [...(localData.aiPicks || []), ...newServerPicks];
          state.data = normalizeData({ ...localData, aiPicks: mergedPicks, meta: serverData.meta || localData.meta });
          // Also merge any new server bets not in local (e.g. from pipeline)
          const localBetIds = new Set((localData.bets || []).map(b => String(b.id)));
          const newServerBets = (serverData.bets || []).filter(b => !localBetIds.has(String(b.id)));
          if (newServerBets.length) state.data.bets = [...state.data.bets, ...newServerBets];
        } else {
          state.data = normalizeData(serverData);
        }
        // Strip any previously passed picks
        const passedIds = getPassedIds();
        if (passedIds.size) {
          state.data.aiPicks = state.data.aiPicks.filter(p => !passedIds.has(String(p.id)));
          saveLocal();
        }
      } catch (error) {
        // Try localStorage as pure fallback
        const localData = loadLocal();
        if (localData && localData.bets) {
          state.data = normalizeData(localData);
        } else {
          state.error = error.message || "Failed to load tracker data.";
        }
      } finally {
        state.loading = false;
        render();
      }
    }

    function normalizeData(data) {
      return {
        meta: data?.meta || DEFAULT_DATA.meta,
        bets: Array.isArray(data?.bets) ? data.bets : [],
        parlays: Array.isArray(data?.parlays) ? data.parlays : [],
        aiPicks: Array.isArray(data?.aiPicks) ? data.aiPicks : []
      };
    }


    function saveLocal() {
      try { localStorage.setItem(LOCAL_KEY, JSON.stringify(state.data)); } catch(e) {}
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(LOCAL_KEY);
        if (raw) return JSON.parse(raw);
      } catch(e) {}
      return null;
    }

    function getPassedIds() {
      try {
        const raw = localStorage.getItem(PASSED_KEY);
        if (raw) return new Set(JSON.parse(raw));
      } catch(e) {}
      return new Set();
    }

    function addPassedId(id) {
      const ids = getPassedIds();
      ids.add(String(id));
      try { localStorage.setItem(PASSED_KEY, JSON.stringify([...ids])); } catch(e) {}
    }

    async function apiJson(url, options = {}) {
      const response = await fetch(url, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch (error) {
        payload = null;
      }

      if (!response.ok) {
        throw new Error(payload?.error || "Request failed.");
      }
      return payload;
    }

    function renderTicketSheet() {
      const item = findTicket(state.sheet.ticketType, state.sheet.ticketId);

        { key: "win", label: "Won" },
        { key: "loss", label: "Lost" },

            <div class="sheet-title">${escapeHtml(title)}</div>

          `}
          <div class="field-grid">
            <label class="field">
              <span class="field-label">Odds / line</span>

            </label>
            <label class="field">
              <span class="field-label">Stake amount</span>
              <input type="number" inputmode="decimal" min="0" step="0.01" data-sheet-field="amount" value="${escapeHtmlAttr(form.amount)}">
            </label>
          </div>
          <div class="field-grid">
            <label class="field">
              <span class="field-label">Book</span>
              <input type="text" data-sheet-field="book" value="${escapeHtmlAttr(form.book)}">
            </label>
            <label class="field">
              <span class="field-label">Payout</span>
              <input type="number" inputmode="decimal" min="0" step="0.01" data-sheet-field="payout" value="${escapeHtmlAttr(form.payout)}">
            </label>
          </div>
          <label class="field">
            <span class="field-label">Score</span>
            <input type="text" data-sheet-field="score" value="${escapeHtmlAttr(form.score)}" placeholder="Final score / note">
          </label>
          <label class="field">
            <span class="field-label">Notes</span>
            <textarea data-sheet-field="notes" placeholder="Ticket notes">${escapeHtml(form.notes)}</textarea>
          </label>
          <div class="sheet-summary">
            <div class="summary-row"><span>Units</span><strong>${amountToUnits(form.amount)}u</strong></div>
            <div class="summary-row"><span>Projected return</span><strong>${money(projectedReturn(form.amount, form.line))}</strong></div>
            <div class="summary-row"><span>Current P/L</span><strong>${signedMoney(formProfitPreview(form))}</strong></div>
          </div>
          <div class="sheet-actions">

            ${normalizeResult(form.result) !== "placed" ? '<button class="btn btn-secondary btn-block" data-action="reopen-ticket">Move back to Open Bets</button>' : ""}
            <button class="btn btn-secondary btn-block" data-action="close-sheet">Done</button>
          </div>
        </div>
      `;

    function handleClick(event) {
      const target = event.target.closest("[data-action]");
      if (!target) return;
      const { action } = target.dataset;

      if (action === "tab") {
        state.activeTab = target.dataset.tab;
        render();
        return;
      }

      if (action === "reload") {
        loadData();
        return;
      }

      if (action === "pass-pick") {
        const pickId = target.dataset.pickId;
        if (pickId) {
          addPassedId(pickId);
          state.data.aiPicks = state.data.aiPicks.filter(p => String(p.id) !== String(pickId));
          saveLocal();
          render();
        }
        return;
      }
      if (action === "place-pick") {
        openPlacePickSheet(target.dataset.pickId);
        return;
      }

      if (action === "open-ticket") {
        openTicketSheet(target.dataset.ticketType, target.dataset.ticketId);
        return;
      }

      if (action === "close-sheet") {
        closeSheet();
        return;
      }

      if (action === "open-manual") {
        openManualSheet();
        return;
      }

      if (action === "submit-place-pick") {
        submitPlacePick();
        return;
      }

      if (action === "submit-manual-bet") {
        submitManualBet();
        return;
      }

      if (action === "save-ticket") {
        saveTicket();
        return;
      }

      if (action === "reopen-ticket") {
        reopenTicket();
        return;
      }

      if (action === "auto-settle") {
        autoSettle();
        return;
      }

      if (action === "history-filter") {
        state.historyFilter = target.dataset.filter;
        render();
        return;
      }

      if (action === "open-filter") {
        state.openFilter = target.dataset.filter;
        render();
        return;
      }

      if (action === "sheet-result" && state.sheet) {
        state.sheet.form.result = target.dataset.result;
        if (target.dataset.result === "win" && !coerceNumber(state.sheet.form.payout)) {
          state.sheet.form.payout = projectedReturn(state.sheet.form.amount, state.sheet.form.line).toFixed(2);
        }
        if (target.dataset.result !== "win" && normalizeResult(target.dataset.result) !== "push") {
          state.sheet.form.payout = "0";
        }
        if (target.dataset.result === "placed") {
          state.sheet.form.payout = "0";
        }
        renderSheet();
      }
    }

    function handleInput(event) {
      const field = event.target.dataset.sheetField;
      if (!field || !state.sheet) return;
      state.sheet.form[field] = event.target.value;
      if (event.type === "change" && (field === "amount" || field === "line" || field === "result")) {
        renderSheet();
      }
    }

    function openPlacePickSheet(pickId) {
      const pick = findAiPick(pickId);
      if (!pick) return;
      state.sheet = {
        type: "place-pick",
        pickId,
        form: {
          pick: pick.pick || "",
          line: String(coerceNumber(pick.line ?? pick.odds) || ""),
          amount: fixedCurrency(coerceNumber(pick.amount ?? pick.recommendedAmount ?? pick.stake) || UNIT_SIZE),
          book: pick.book || "DraftKings",
          gameTime: pick.gameTime || "",
          notes: ""
        }
      };
      renderSheet();
    }

    function openManualSheet() {
      state.sheet = {
        type: "manual-bet",
        form: {
          game: "",
          pick: "",
          line: "-110",
          amount: fixedCurrency(UNIT_SIZE),
          book: "DraftKings",
          type: "spread",
          date: todayString(),
          gameTime: "",
          notes: ""
        }
      };
      renderSheet();
    }

    function openTicketSheet(ticketType, ticketId) {
      const item = findTicket(ticketType, ticketId);
      if (!item) return;
      state.sheet = {
        type: "ticket-detail",
        ticketType,
        ticketId,
        form: {
          game: item.game || "",
          pick: item.pick || item.name || "",
          line: String(coerceNumber(item.line) || ""),
          amount: fixedCurrency(ticketStake(item)),
          book: item.book || "",
          payout: fixedCurrency(coerceNumber(item.payout)),
          score: item.score || "",
          notes: item.notes || "",
          result: normalizeResult(item.result),
          status: normalizeResult(item.result)
        }
      };
      renderSheet();
    }

    function closeSheet() {
      state.sheet = null;
      renderSheet();
    }

    async function submitPlacePick() {
      if (!state.sheet || state.sheet.type !== "place-pick") return;
      const pick = findAiPick(state.sheet.pickId);
      const form = state.sheet.form;
      if (!pick) return;

      if (!form.pick.trim()) return toast("Ticket label is required.", "error");
      if (!isPositiveNumber(form.amount)) return toast("Stake amount must be positive.", "error");
      if (!isNumber(form.line)) return toast("Odds / line must be valid.", "error");

      try {
        await apiJson(API.picksPlace, {
          method: "POST",
          body: JSON.stringify({
            id: pick.id,
            game: pick.game,
            pick: form.pick.trim(),
            line: coerceNumber(form.line),
            originalLine: coerceNumber(form.line),
            amount: roundMoney(form.amount),
            units: roundUnits(form.amount),
            book: form.book.trim() || pick.book || "DraftKings",
            gameTime: form.gameTime.trim() || pick.gameTime || "TBD",
            notes: form.notes.trim() || pick.analysis || "",
            sport: pick.sport || "ncaab",
            type: pick.type || inferType(form.pick)
          })
        });
        toast("Bet confirmed and moved to Open Bets.", "success");
        state.activeTab = "open";
        closeSheet();
        await loadData();
        // Strip any previously passed picks
        const passedIds = getPassedIds();
        if (passedIds.size) {
          state.data.aiPicks = state.data.aiPicks.filter(p => !passedIds.has(String(p.id)));
          saveLocal();
        }
      } catch (error) {
        // Fall back to local placement using state.data
        if (pick) {
          const line = coerceNumber(form.line) || coerceNumber(pick.line ?? pick.odds);
          const amount = coerceNumber(form.amount) || UNIT_SIZE;
          const maxId = state.data.bets.reduce((m, b) => Math.max(m, Number(b.id) || 0), 0);
          state.data.bets.unshift({
            id: maxId + 1,
            date: pick.date || todayString(),
            gameTime: form.gameTime.trim() || pick.gameTime || "TBD",
            game: form.game.trim() || pick.game || "TBD",
            pick: form.pick.trim() || pick.pick || "",
            line, originalLine: line, odds: line,
            amount, units: roundUnits(amount),
            sport: pick.sport || "ncaab",
            type: inferType(form.pick || pick.pick),
            result: "placed",
            book: form.book.trim() || pick.book || "draftkings",
            notes: form.notes.trim() || pick.analysis || "",
            confidence: pick.confidence || null,
            sourcePickId: pick.id
          });
          addPassedId(pick.id);
          state.data.aiPicks = state.data.aiPicks.filter(p => String(p.id) !== String(pick.id));
          saveLocal();
          toast("Bet confirmed locally.", "success");
          state.activeTab = "open";
          closeSheet();
          render();
        } else {
          toast("Could not place this pick.", "error");
        }
      }
    }

    async function submitManualBet() {
      if (!state.sheet || state.sheet.type !== "manual-bet") return;
      const form = state.sheet.form;
      if (!form.game.trim() || !form.pick.trim()) return toast("Game and ticket label are required.", "error");
      if (!isPositiveNumber(form.amount)) return toast("Stake amount must be positive.", "error");
      if (!isNumber(form.line)) return toast("Odds / line must be valid.", "error");

      try {
        await apiJson(API.bets, {
          method: "POST",
          body: JSON.stringify({
            game: form.game.trim(),
            pick: form.pick.trim(),
            line: coerceNumber(form.line),
            originalLine: coerceNumber(form.line),
            amount: roundMoney(form.amount),
            units: roundUnits(form.amount),
            book: form.book.trim() || "DraftKings",
            type: form.type || inferType(form.pick),
            date: form.date || todayString(),
            gameTime: form.gameTime.trim() || "TBD",
            notes: form.notes.trim(),
            result: "placed",
            status: "placed"
          })
        });
        toast("Manual bet added to Open Bets.", "success");
        state.activeTab = "open";
        closeSheet();
        await loadData();
      } catch (error) {
        // Fall back to local
        const form = state.sheet.form;
        const line = coerceNumber(form.line);
        const amount = coerceNumber(form.amount);
        if (line && amount > 0) {
          bets.unshift({
            id: nextBetId(),
            date: todayET(),
            gameTime: form.gameTime || "TBD",
            game: form.game || "TBD",
            pick: form.pick || "",
            line, originalLine: line, odds: line,
            amount, units: Math.round((amount / UNIT_SIZE) * 100) / 100,
            sport: form.sport || "ncaab",
            type: inferType(form.pick),
            result: "placed",
            book: form.book || "draftkings",
            notes: form.notes || ""
          });
          toast("Bet saved locally.", "success");
          closeSheet();
          render();
        } else {
          toast("Could not create the manual bet.", "error");
        }
      }
    }

    async function saveTicket() {
      if (!state.sheet || state.sheet.type !== "ticket-detail") return;
      const item = findTicket(state.sheet.ticketType, state.sheet.ticketId);
      const form = state.sheet.form;
      if (!item) return;
      if (!isPositiveNumber(form.amount)) return toast("Stake amount must be positive.", "error");
      if (!isNumber(form.line)) return toast("Odds / line must be valid.", "error");

      const normalized = normalizeResult(form.result);
      const body = {
        line: coerceNumber(form.line),
        amount: roundMoney(form.amount),
        units: roundUnits(form.amount),
        book: form.book.trim(),
        payout: normalized === "placed" ? 0 : roundMoney(form.payout),
        score: form.score.trim(),
        notes: form.notes.trim(),
        result: normalized,
        status: normalized
      };

      if (state.sheet.ticketType === "bet") {
        body.pick = form.pick.trim();
        body.game = form.game.trim();
      }

      if (normalized === "win" && !coerceNumber(body.payout)) {
        body.payout = roundMoney(projectedReturn(form.amount, form.line));
      }

      if (normalized === "push") {
        body.payout = roundMoney(form.amount);
      }

      try {
        await apiJson(ticketRoute(state.sheet.ticketType, item.id), {
          method: "PATCH",
          body: JSON.stringify(body)
        });
        toast("Ticket saved.", "success");
        closeSheet();
        await loadData();
      } catch (error) {
        toast(error.message || "Could not save this ticket.", "error");
      }
    }

    async function reopenTicket() {
      if (!state.sheet || state.sheet.type !== "ticket-detail") return;
      state.sheet.form.result = "placed";
      state.sheet.form.payout = "0";
      await saveTicket();
    }

    async function autoSettle() {
      if (state.syncing) return;
      state.syncing = true;
      render();
      try {
        const data = await apiJson(API.settle, { method: "POST" });
        state.data = normalizeData(data);
        toast("Scores checked and tracker refreshed.", "success");
      } catch (error) {
        toast(error.message || "Auto settle failed.", "error");
      } finally {
        state.syncing = false;
        render();
      }
    }

    function topbarTitle() {
      if (state.activeTab === "picks") return "AI intake board";
      if (state.activeTab === "open") return "Open bet wallet";
      if (state.activeTab === "history") return "Results archive";
      return "Bankroll center";
    }

    function topbarSubtitle(summary) {
      if (state.activeTab === "picks") return `${state.data.aiPicks.length} picks waiting for review`;
      if (state.activeTab === "open") return `${summary.placedCount} open tickets • ${money(summary.atRisk)} exposed`;
      if (state.activeTab === "history") return `${summary.settledCount} settled • ${signedMoney(summary.realized)} realized`;
      return `${summary.wins}-${summary.losses}${summary.pushes ? `-${summary.pushes}` : ""} record • ${summary.roi.toFixed(1)}% ROI`;
    }

    function sortedAiPicks() {
      return [...state.data.aiPicks].sort((left, right) => {
        const leftStamp = `${left.date || ""} ${left.gameTime || ""}`;
        const rightStamp = `${right.date || ""} ${right.gameTime || ""}`;
        return leftStamp.localeCompare(rightStamp);
      });
    }

    function openTickets() {
      return allTickets(state.data)
        .filter((item) => normalizeResult(item.result) === "placed")
        .sort((left, right) => `${left.date || ""} ${left.gameTime || ""}`.localeCompare(`${right.date || ""} ${right.gameTime || ""}`));
    }

    function filteredOpenTickets() {
      const items = openTickets();
      if (state.openFilter === "bets") return items.filter((item) => item.ticketType === "bet");
      if (state.openFilter === "parlays") return items.filter((item) => item.ticketType === "parlay");
      return items;
    }

    function settledTickets() {
      return allTickets(state.data)
        .filter((item) => ["win", "loss", "push"].includes(normalizeResult(item.result)))
        .sort((left, right) => `${right.date || ""} ${right.gameTime || ""}`.localeCompare(`${left.date || ""} ${left.gameTime || ""}`));
    }

    function filteredHistoryTickets() {
      const items = settledTickets();
      if (state.historyFilter === "all") return items;
      return items.filter((item) => normalizeResult(item.result) === state.historyFilter);
    }

    function allTickets(data) {
      return [
        ...(data.bets || []).map((bet) => ({ ...bet, ticketType: "bet" })),
        ...(data.parlays || []).map((parlay) => ({ ...parlay, ticketType: "parlay" }))
      ];
    }

    function summarizeData(data) {
      const tickets = allTickets(data);
      const settled = tickets.filter((item) => ["win", "loss", "push"].includes(normalizeResult(item.result)));
      const placed = tickets.filter((item) => normalizeResult(item.result) === "placed");
      const active = tickets.filter((item) => normalizeResult(item.result) === "placed" || ["win", "loss", "push"].includes(normalizeResult(item.result)));
      const totalWagered = active.reduce((sum, item) => sum + ticketStake(item), 0);
      const totalReturned = settled.reduce((sum, item) => sum + ticketReturn(item), 0);
      const realized = tickets.reduce((sum, item) => sum + ticketProfit(item), 0);
      const settledRisked = settled.reduce((sum, item) => sum + ticketStake(item), 0);
      const wins = settled.filter((item) => normalizeResult(item.result) === "win").length;
      const losses = settled.filter((item) => normalizeResult(item.result) === "loss").length;
      const pushes = settled.filter((item) => normalizeResult(item.result) === "push").length;
      const openingCash = coerceNumber(data?.meta?.openingCash) || 199.88;
      return {
        openingCash,
        totalWagered,
        totalReturned,
        realized,
        roi: settledRisked ? (realized / settledRisked) * 100 : 0,
        winRate: wins + losses ? (wins / (wins + losses)) * 100 : 0,
        wins,
        losses,
        pushes,
        placedCount: placed.length,
        atRisk: placed.reduce((sum, item) => sum + ticketStake(item), 0),
        settledCount: settled.length,
        bankroll: openingCash - totalWagered + totalReturned
      };
    }

    function ticketStake(item) {
      const amount = coerceNumber(item.amount);
      if (amount > 0) return roundMoney(amount);
      return roundMoney(coerceNumber(item.units) * UNIT_SIZE);
    }

    function ticketReturn(item) {
      const result = normalizeResult(item.result);
      const stake = ticketStake(item);
      if (result === "placed") return 0;
      if (result === "push") return stake;
      if (result === "win") {
        if (coerceNumber(item.payout) > 0) return roundMoney(item.payout);
        return projectedReturn(stake, item.line);
      }
      return 0;
    }

    function ticketProfit(item) {
      const result = normalizeResult(item.result);
      const stake = ticketStake(item);
      if (result === "placed") return -stake;
      if (result === "push") return 0;
      if (result === "loss") return -stake;
      if (result === "win") return roundMoney(ticketReturn(item) - stake);
      return 0;
    }

    function formProfitPreview(form) {
      const result = normalizeResult(form.result);
      const stake = coerceNumber(form.amount);
      if (result === "placed") return -stake;
      if (result === "loss") return -stake;
      if (result === "push") return 0;
      if (result === "win") {
        const payout = coerceNumber(form.payout);
        return payout > 0 ? roundMoney(payout - stake) : impliedProfit(stake, coerceNumber(form.line));
      }
      return 0;
    }

    function projectedReturn(amount, odds) {
      const stake = coerceNumber(amount);
      const line = coerceNumber(odds);
      if (!stake || !line) return 0;
      return roundMoney(stake + impliedProfit(stake, line));
    }

    function impliedProfit(amount, odds) {
      const stake = coerceNumber(amount);
      const line = coerceNumber(odds);
      if (!stake || !line) return 0;
      if (line > 0) return roundMoney(stake * (line / 100));
      return roundMoney(stake * (100 / Math.abs(line)));
    }

    function normalizeResult(result) {
      if (result === "won") return "win";
      if (result === "lost") return "loss";
      return result || "placed";
    }

    function chipClass(item) {
      const result = normalizeResult(item.result);
      if (result === "placed") return "pending";
      if (result === "win") return "win";
      if (result === "loss") return "loss";
      return "push";
    }

    function chipLabel(item) {
      const result = normalizeResult(item.result);
      if (result === "placed") return "Open";
      if (result === "win") return "Won";
      if (result === "loss") return "Lost";
      if (result === "push") return "Push";
      return result;
    }

    function inferType(pick) {
      const label = String(pick || "").toLowerCase();
      if (label.includes("over") || label.includes("under")) return "total";
      if (/[+-]\d+(\.\d+)?/.test(label)) return "spread";
      return "moneyline";
    }

    function findAiPick(id) {
      return state.data.aiPicks.find((pick) => String(pick.id) === String(id));
    }

    function findTicket(type, id) {
      const pool = type === "parlay" ? (state.data.parlays || []) : (state.data.bets || []);
      const item = pool.find((entry) => String(entry.id) === String(id));
      return item ? { ...item, ticketType: type === "parlay" ? "parlay" : "bet" } : null;
    }

    function ticketRoute(type, id) {
      return type === "parlay" ? `${API.parlays}/${encodeURIComponent(id)}` : `${API.bets}/${encodeURIComponent(id)}`;
    }

    function amountToUnits(amount) {
      return roundUnits(amount).toFixed(2).replace(/\.00$/, "");
    }

    function roundUnits(amount) {
      return roundMoney(coerceNumber(amount) / UNIT_SIZE);
    }

    function roundMoney(value) {
      return Math.round(coerceNumber(value) * 100) / 100;
    }

    function coerceNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function isNumber(value) {
      return Number.isFinite(Number(value));
    }

    function isPositiveNumber(value) {
      return Number.isFinite(Number(value)) && Number(value) > 0;
    }

    function money(value) {
      return formatter.format(coerceNumber(value));
    }

    function signedMoney(value) {
      const number = roundMoney(value);
      return `${number >= 0 ? "+" : "-"}${money(Math.abs(number))}`;
    }

    function fixedCurrency(value) {
      return roundMoney(value).toFixed(2);
    }

    function formatOdds(value) {
      const number = coerceNumber(value);
      if (!number) return "N/A";
      return number > 0 ? `+${number}` : String(number);
    }

    function formatDate(value) {
      const parsed = new Date(`${value}T12:00:00`);
      if (Number.isNaN(parsed.getTime())) return value || "No date";
      return dateFormatter.format(parsed);
    }

    function todayString() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function confidenceLabel(confidence) {
      const number = coerceNumber(confidence);
      if (number >= 4) return "high";
      if (number >= 2) return "medium";
      return "lean";
    }

    function toast(message, tone = "success") {
      const id = crypto.randomUUID();
      state.toasts = [...state.toasts, { id, message, tone }];
      renderToasts();
      window.setTimeout(() => {
        state.toasts = state.toasts.filter((item) => item.id !== id);
        renderToasts();
      }, 2800);
    }

    function renderToasts() {
      refs.toastWrap.innerHTML = state.toasts.map((item) => `<div class="toast ${item.tone}">${escapeHtml(item.message)}</div>`).join("");
    }

    function renderEmpty(title, copy) {
      return `
        <div class="empty">
          <div class="empty-title">${escapeHtml(title)}</div>
          <div class="empty-copy">${escapeHtml(copy)}</div>
        </div>
      `;
    }

    function groupBy(items, getKey) {
      return items.reduce((groups, item) => {
        const key = getKey(item);
        if (!groups[key]) groups[key] = [];
        groups[key].push(item);
        return groups;
      }, {});
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeHtmlAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }
  </script>
</body>
</html>
